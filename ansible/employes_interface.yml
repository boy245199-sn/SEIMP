          <div class="confirm-dialog" id="confirm-delete">
            <div class="confirm-box">
              <div class="confirm-icon">🗑️</div>
              <h3>Supprimer l'employé ?</h3>
              <p>Cette action est irréversible.<br>L'entrée sera supprimée du JSON et du LDAP.</p>
              <div class="confirm-btns">
                <button class="btn btn-ghost" onclick="document.getElementById('confirm-delete').classList.remove('open')"><i class="fas fa-times"></i> Annuler</button>
                <a id="confirm-delete-link" href="#" class="btn btn-danger"><i class="fas fa-trash"></i> Supprimer</a>
