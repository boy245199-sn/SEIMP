          <!-- CONFIRM DELETE -->
          <div class="confirm-overlay" id="confirm-del">
            <div class="confirm-box">
              <span class="c-emoji">🗑️</span>
              <h3>Supprimer l'employé ?</h3>
              <p>Action irréversible. Retiré du JSON et du LDAP.</p>
              <div class="confirm-btns">
                <button class="btn btn-ghost" onclick="document.getElementById('confirm-del').classList.remove('open')">Annuler</button>
                <a id="confirm-del-link" href="#" class="btn btn-danger">🗑 Supprimer</a>
              </div>
            </div>
          </div>

          <script>
          const employees = <?php echo json_encode($employees, JSON_UNESCAPED_UNICODE); ?>;
          const depts_js  = <?php echo json_encode(array_map(fn($d)=>$d['label'],$departements), JSON_UNESCAPED_UNICODE); ?>;
          const depts_keys = <?php echo json_encode(array_keys($departements)); ?>;
          const depts_icons = <?php echo json_encode(array_map(fn($d)=>$d['icon'],$departements), JSON_UNESCAPED_UNICODE); ?>;
          const depts_count = <?php echo json_encode($depts_count); ?>;
          const monthly_data = <?php echo json_encode($monthly); ?>;
          const total = <?php echo $total; ?>;
          const actifs = <?php echo $actifs; ?>;
          const suspendus = <?php echo $suspendus; ?>;

          document.getElementById('ts-date').textContent = new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});

          // ── Dark mode ──────────────────────────────────────────────────
          var darkBtn=document.getElementById('darkToggle');
          function applyDark(d){ document.body.classList.toggle('dark',d); darkBtn.textContent=d?'☀️':'🌙'; }
          function toggleDark(){ var d=!document.body.classList.contains('dark'); applyDark(d); try{localStorage.setItem('seimp_dark',d?'1':'0');}catch(e){} }
          (function(){ var s=null; try{s=localStorage.getItem('seimp_dark');}catch(e){} if(s==='1') applyDark(true); else if(s===null&&window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches) applyDark(true); })();

          // ── Section routing ────────────────────────────────────────────
          const sectionTitles = {dashboard:'Tableau de bord',employees:'Employés',add:'Ajouter un employé',badges:'Badges'};
          function showSection(name, el) {
            document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
            document.getElementById('section-'+name).classList.add('active');
            document.getElementById('page-title').textContent = sectionTitles[name]||name;
            if(el) el.classList.add('active');
            if(name==='dashboard') drawCharts();
            // Update URL without reload
            try{ history.replaceState(null,'','?section='+name+(location.search.includes('msg=')?'&msg='+encodeURIComponent(new URLSearchParams(location.search).get('msg')):''));} catch(e){}
          }

          // ── Init section from URL ─────────────────────────────────────
          (function(){
            var params = new URLSearchParams(location.search);
            var sec = params.get('section') || 'dashboard';
            var navEl = document.getElementById('nav-'+sec);
            showSection(sec, navEl);
          })();

          // ── Charts ─────────────────────────────────────────────────────
          var chartsDrawn = false;
          function drawCharts(){
            if(chartsDrawn) return;
            chartsDrawn = true;
            var isDark = document.body.classList.contains('dark');
            var textColor = isDark ? '#c9bfb3' : '#9c8f82';
            var gridColor = isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.05)';

            // Chart département — bar
            var ctxD = document.getElementById('chartDept');
            if(ctxD && Object.keys(depts_count).length > 0){
              var labels = Object.keys(depts_count).map(k => (depts_icons[k]||'') + ' ' + (depts_js[k]||k));
              var values = Object.values(depts_count);
              var colors = ['#e8601c','#1d4ed8','#7c3aed','#1a7f4b','#c92121','#b45309','#0891b2','#be185d','#059669','#dc2626','#7c3aed'];
              drawBarChart(ctxD, labels, values, colors.slice(0,values.length), textColor, gridColor);
            }

            // Chart status — donut
            var ctxS = document.getElementById('chartStatus');
            if(ctxS && total > 0){
              drawDonutChart(ctxS, ['Actifs','Suspendus'], [actifs,suspendus], ['#1a7f4b','#b45309'], textColor);
            }

            // Chart monthly
            var ctxM = document.getElementById('chartMonthly');
            if(ctxM && Object.keys(monthly_data).length > 0){
              var mLabels = Object.keys(monthly_data);
              var mValues = Object.values(monthly_data);
              drawLineChart(ctxM, mLabels, mValues, '#7c3aed', textColor, gridColor);
            }
          }

          function drawBarChart(canvas, labels, values, colors, textColor, gridColor){
            var ctx = canvas.getContext('2d');
            var W = canvas.parentElement.offsetWidth; var H = 220;
            canvas.width = W; canvas.height = H;
            var pad = {top:10,right:10,bottom:60,left:30};
            var cW = W - pad.left - pad.right;
            var cH = H - pad.top - pad.bottom;
            var max = Math.max(...values) || 1;
            var barW = Math.max(8, cW/labels.length - 8);
            ctx.clearRect(0,0,W,H);
            // Grid
            for(var i=0;i<=4;i++){
              var y = pad.top + cH - (i/4)*cH;
              ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
              ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
              ctx.fillStyle = textColor; ctx.font = '10px Sora,sans-serif'; ctx.textAlign='right';
              ctx.fillText(Math.round(max*i/4), pad.left-4, y+3);
            }
            // Bars
            labels.forEach(function(lbl,i){
              var x = pad.left + (cW/labels.length)*i + (cW/labels.length - barW)/2;
              var barH = (values[i]/max)*cH;
              var y = pad.top + cH - barH;
              ctx.fillStyle = colors[i] || '#e8601c';
              ctx.beginPath();
              var r = Math.min(4, barW/2);
              ctx.moveTo(x+r,y); ctx.lineTo(x+barW-r,y);
              ctx.quadraticCurveTo(x+barW,y,x+barW,y+r);
              ctx.lineTo(x+barW,y+barH); ctx.lineTo(x,y+barH);
              ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
              ctx.closePath(); ctx.fill();
              // Value
              ctx.fillStyle = textColor; ctx.font = '10px Sora,sans-serif'; ctx.textAlign='center';
              ctx.fillText(values[i], x+barW/2, y-4);
              // Label
              ctx.save(); ctx.translate(x+barW/2, pad.top+cH+10);
              ctx.rotate(-Math.PI/4); ctx.textAlign='right';
              ctx.font = '9px Sora,sans-serif'; ctx.fillStyle = textColor;
              ctx.fillText(lbl, 0, 0); ctx.restore();
            });
          }

          function drawDonutChart(canvas, labels, values, colors, textColor){
            var ctx = canvas.getContext('2d');
            var size = Math.min(canvas.parentElement.offsetWidth, 220);
            canvas.width = size; canvas.height = size;
            var cx = size/2, cy = size/2, r = size*0.38, ri = size*0.22;
            var total_v = values.reduce((a,b)=>a+b,0) || 1;
            var start = -Math.PI/2;
            ctx.clearRect(0,0,size,size);
            values.forEach(function(v,i){
              var angle = (v/total_v)*2*Math.PI;
              ctx.beginPath(); ctx.moveTo(cx,cy);
              ctx.arc(cx,cy,r,start,start+angle);
              ctx.closePath(); ctx.fillStyle = colors[i]; ctx.fill();
              start += angle;
            });
            // Hole
            ctx.beginPath(); ctx.arc(cx,cy,ri,0,2*Math.PI);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--surface').trim() || '#fff';
            ctx.fill();
            // Center text
            ctx.fillStyle = textColor; ctx.font = 'bold 18px Playfair Display,serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(total_v, cx, cy-6);
            ctx.font = '9px Sora,sans-serif'; ctx.fillText('employés', cx, cy+10);
            // Legend
            var ly = size - 30;
            labels.forEach(function(lbl,i){
              var lx = i===0 ? size*0.18 : size*0.58;
              ctx.fillStyle = colors[i]; ctx.fillRect(lx,ly,10,10);
              ctx.fillStyle = textColor; ctx.font = '10px Sora,sans-serif'; ctx.textAlign='left';
              ctx.fillText(lbl+' ('+values[i]+')', lx+14, ly+8);
            });
          }

          function drawLineChart(canvas, labels, values, color, textColor, gridColor){
            var ctx = canvas.getContext('2d');
            var W = canvas.parentElement.offsetWidth; var H = 160;
            canvas.width = W; canvas.height = H;
            var pad = {top:10,right:10,bottom:30,left:30};
            var cW = W-pad.left-pad.right; var cH = H-pad.top-pad.bottom;
            var max = Math.max(...values) || 1;
            ctx.clearRect(0,0,W,H);
            // Grid
            for(var i=0;i<=3;i++){
              var y = pad.top + cH - (i/3)*cH;
              ctx.strokeStyle=gridColor; ctx.lineWidth=1;
              ctx.beginPath(); ctx.moveTo(pad.left,y); ctx.lineTo(W-pad.right,y); ctx.stroke();
              ctx.fillStyle=textColor; ctx.font='9px Sora,sans-serif'; ctx.textAlign='right';
              ctx.fillText(Math.round(max*i/3),pad.left-4,y+3);
            }
            // Area fill
            var pts = labels.map(function(l,i){ return {x:pad.left+(cW/(labels.length-1||1))*i, y:pad.top+cH-(values[i]/max)*cH}; });
            ctx.beginPath(); ctx.moveTo(pts[0].x, pad.top+cH);
            pts.forEach(function(p){ ctx.lineTo(p.x,p.y); });
            ctx.lineTo(pts[pts.length-1].x, pad.top+cH); ctx.closePath();
            ctx.fillStyle = color+'22'; ctx.fill();
            // Line
            ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
            pts.forEach(function(p,i){ if(i>0) ctx.lineTo(p.x,p.y); });
            ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
            // Dots + labels
            pts.forEach(function(p,i){
              ctx.beginPath(); ctx.arc(p.x,p.y,3,0,2*Math.PI);
              ctx.fillStyle=color; ctx.fill();
              ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
              ctx.fillStyle=textColor; ctx.font='9px Sora,sans-serif'; ctx.textAlign='center';
              ctx.fillText(labels[i], p.x, pad.top+cH+14);
            });
          }

          // ── Table filters ──────────────────────────────────────────────
          function filterTable(){
            var q=document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('#emp-table tbody tr').forEach(r=>{ r.style.display=r.dataset.search.includes(q)?'':'none'; });
          }
          var actSt='all', actDpt='';
          function filterStatus(s,btn){ actSt=s; actDpt=''; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyF(); }
          function filterDept(d,btn){ actDpt=d; actSt='all'; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); applyF(); }
          function applyF(){ document.querySelectorAll('#emp-table tbody tr').forEach(r=>{ r.style.display=((actSt==='all'||r.dataset.status===actSt)&&(actDpt===''||r.dataset.dept===actDpt))?'':'none'; }); }

          // ── Edit modal ─────────────────────────────────────────────────
          function openEdit(idx){
            var e=employees[idx];
            document.getElementById('edit-idx').value=idx;
            document.getElementById('edit-prenom').value=e.prenom||'';
            document.getElementById('edit-nom').value=e.nom||'';
            document.getElementById('edit-email').value=e.email||'';
            document.getElementById('edit-telephone').value=e.telephone||'';
            document.getElementById('edit-departement').value=e.departement||'';
            document.getElementById('edit-poste').value=e.poste||'';
            document.getElementById('edit-modal').classList.add('open');
          }
          function closeModal(id){ document.getElementById(id).classList.remove('open'); }
          function openSuspend(idx){
            document.getElementById('s-temp').href='?suspend='+idx+'&type=temporaire&section=employees';
            document.getElementById('s-def').href='?suspend='+idx+'&type=definitif&section=employees';
            document.getElementById('suspend-modal').classList.add('open');
          }
          function confirmDelete(idx){
            document.getElementById('confirm-del-link').href='?delete='+idx+'&section=employees';
            document.getElementById('confirm-del').classList.add('open');
          }
          document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

          // ── Photo preview ──────────────────────────────────────────────
          function previewPhoto(input){
            if(input.files&&input.files[0]){
              var r=new FileReader(); r.onload=function(e){ document.getElementById('photo-preview-container').innerHTML='<img src="'+e.target.result+'" class="photo-preview-img"><div style="font-size:.65rem;color:var(--orange);margin-top:4px;">Photo sélectionnée ✓</div>'; }; r.readAsDataURL(input.files[0]);
            }
          }

          // ── Badge ──────────────────────────────────────────────────────
          function generateBadge(idx){
            var e=employees[idx];
            showSection('badges',document.getElementById('nav-badges'));
            var dept=depts_js[e.departement]||e.departement||'';
            var ini=((e.prenom||'?').charAt(0)+(e.nom||'?').charAt(0)).toUpperCase();
            var photoHtml=e.photo&&e.photo!==''?'<img src="'+e.photo+'" class="bc-photo" style="margin:0 auto;display:block;" onerror="this.outerHTML=\'<div style=width:88px;height:88px;border-radius:50%;background:rgba(232,96,28,.15);color:#e8601c;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto>'+ini+'</div>\'">':'<div style="width:88px;height:88px;border-radius:50%;background:rgba(232,96,28,.15);color:#e8601c;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;margin:0 auto;">'+ini+'</div>';
            var qr='https://api.qrserver.com/v1/create-qr-code/?size=120x120&bgcolor=1c1108&color=e8601c&data='+encodeURIComponent(JSON.stringify({uid:e.uid,name:(e.prenom||'')+' '+(e.nom||''),poste:e.poste}));
            document.getElementById('badge-preview-area').innerHTML='<div id="badge-card-render" class="badge-card"><div class="bc-company">SEIMP Enterprise</div><div style="text-align:center">'+photoHtml+'<div class="bc-name">'+(e.prenom||'')+' '+(e.nom||'')+'</div><div class="bc-title">'+(e.poste||'')+'</div><div class="bc-dept">'+dept+'</div></div><div class="badge-info-row"><div class="badge-chip">🪪 '+(e.uid||'')+'</div><div class="badge-chip">✉ '+(e.email||'')+'</div></div><div style="text-align:center"><div class="badge-qr"><img src="'+qr+'" width="120" height="120"></div></div><div style="text-align:center;margin-top:12px;font-size:10px;opacity:.35;">Badge officiel SEIMP · Ne pas reproduire</div></div>';
            document.getElementById('dl-badge-btn').style.display='inline-flex';
          }
          function downloadBadge(){
            html2canvas(document.getElementById('badge-card-render'),{scale:2,backgroundColor:'#1c1108'}).then(c=>{ var a=document.createElement('a'); a.download='badge_seimp_'+Date.now()+'.png'; a.href=c.toDataURL(); a.click(); });
          }
          </script>
          </body>
          </html>

