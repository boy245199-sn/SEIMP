---
- name: Déployer l'interface de gestion des employés SEIMP
  hosts: ldap
  become: yes
  tasks:
    - name: Installer PHP et extensions
      apt:
        name:
          - php
          - php-ldap
          - php-gd
          - php-mbstring
          - libapache2-mod-php
        state: present

    - name: Créer les répertoires
      file:
        path: "{{ item }}"
        state: directory
        mode: 0775
        owner: www-data
        group: www-data
      loop:
        - /var/www/html/photos
        - /var/www/html/data

    - name: Créer le fichier JSON vide
      copy:
        dest: /var/www/html/data/employees.json
        content: '[]'
        mode: 0664
        owner: www-data
        group: www-data

    - name: Activer le module rewrite Apache
      command: a2enmod rewrite
      ignore_errors: yes

    - name: Déployer employes.php
      copy:
        dest: /var/www/html/employes.php
        mode: 0644
        owner: www-data
        group: www-data
        content: |
          <?php
          session_start();
          if (!isset($_SERVER['PHP_AUTH_USER'])) {
              header('WWW-Authenticate: Basic realm="SEIMP RH"');
              header('HTTP/1.0 401 Unauthorized');
              exit('Accès non autorisé');
          }
          $valid_users = ['admin' => 'niang123', 'badge_manager' => 'badge123'];
          if (!isset($valid_users[$_SERVER['PHP_AUTH_USER']]) ||
              $valid_users[$_SERVER['PHP_AUTH_USER']] !== $_SERVER['PHP_AUTH_PW']) {
              header('WWW-Authenticate: Basic realm="SEIMP RH"');
              header('HTTP/1.0 401 Unauthorized');
              exit('Identifiants invalides');
          }

          function ldap_connect_admin() {
              $conn = ldap_connect("ldap://127.0.0.1:389");
              ldap_set_option($conn, LDAP_OPT_PROTOCOL_VERSION, 3);
              ldap_set_option($conn, LDAP_OPT_REFERRALS, 0);
              ldap_set_option($conn, LDAP_OPT_X_TLS_REQUIRE_CERT, LDAP_OPT_X_TLS_NEVER);
              $bind = @ldap_bind($conn, "cn=admin,dc=nodomain", "niang123");
              return $bind ? $conn : false;
          }

          function make_ssha($password) {
              $salt = random_bytes(8);
              return '{SSHA}' . base64_encode(sha1($password . $salt, true) . $salt);
          }

          $data_file = '/var/www/html/data/employees.json';
          $photo_dir = '/var/www/html/photos/';
          $employees = json_decode(file_get_contents($data_file), true) ?: [];

          $departements = [
              'direction'  => ['label' => 'Direction Générale',     'gid' => 10000, 'icon' => '🏛️'],
              'it'         => ['label' => 'Informatique & Tech',    'gid' => 10002, 'icon' => '💻'],
              'securite'   => ['label' => 'Sécurité',               'gid' => 10003, 'icon' => '🛡️'],
              'menage'     => ['label' => 'Ménage & Propreté',      'gid' => 10004, 'icon' => '🧹'],
              'commercial' => ['label' => 'Commercial',             'gid' => 10001, 'icon' => '📈'],
              'finance'    => ['label' => 'Finance & Comptabilité', 'gid' => 10001, 'icon' => '💰'],
              'rh'         => ['label' => 'Ressources Humaines',    'gid' => 10001, 'icon' => '👥'],
              'logistique' => ['label' => 'Logistique',             'gid' => 10001, 'icon' => '🚚'],
              'cantine'    => ['label' => 'Restauration',           'gid' => 10004, 'icon' => '🍽️'],
              'juridique'  => ['label' => 'Juridique',              'gid' => 10001, 'icon' => '⚖️'],
              'marketing'  => ['label' => 'Marketing',              'gid' => 10001, 'icon' => '📣'],
          ];

          $postes = ['Directeur Général','Directeur Adjoint','Manager','Chef de Projet','Développeur','Administrateur Système','Technicien IT','Analyste','Comptable','Auditeur','Contrôleur Financier','Commercial','Chargé de Clientèle','Responsable Ventes','Chargé RH','Responsable RH','Recruteur','Agent de Sécurité','Chef Sécurité','Vigile','Agent de Ménage','Responsable Propreté','Cuisinier','Serveur','Responsable Cantine','Juriste','Conseiller Juridique','Chargé Marketing','Designer','Stagiaire','Apprenti','Consultant Externe','Assistant Administratif','Secrétaire'];
          sort($postes);

          // ── PRG : traitement POST puis redirect ──────────────────────────
          if ($_SERVER['REQUEST_METHOD'] === 'POST') {
              $action = $_POST['action'] ?? '';
              $section = $_POST['section'] ?? 'employees';

              $photo_path = "";
              if (isset($_FILES['photo']) && $_FILES['photo']['error'] === UPLOAD_ERR_OK && $_FILES['photo']['size'] > 0) {
                  $ext = strtolower(pathinfo($_FILES['photo']['name'], PATHINFO_EXTENSION));
                  if (in_array($ext, ['jpg','jpeg','png','gif','webp'])) {
                      $photo_name = uniqid('emp_') . '.' . $ext;
                      if (move_uploaded_file($_FILES['photo']['tmp_name'], $photo_dir . $photo_name))
                          $photo_path = '/photos/' . $photo_name;
                  }
              }

              if ($action === 'add') {
                  $uid = preg_replace('/[^a-z0-9]/', '', strtolower(substr($_POST['prenom'],0,1) . $_POST['nom']));
                  $uidNumber = rand(20000, 60000);
                  $gid = $departements[$_POST['departement']]['gid'] ?? 10001;
                  $new_emp = [
                      'uid' => $uid, 'prenom' => trim($_POST['prenom']), 'nom' => trim($_POST['nom']),
                      'departement' => $_POST['departement'], 'poste' => $_POST['poste'],
                      'email' => trim($_POST['email']), 'telephone' => trim($_POST['telephone'] ?? ''),
                      'photo' => $photo_path, 'statut' => 'actif', 'suspension' => '',
                      'created_at' => date('Y-m-d H:i:s'), 'uidNumber' => $uidNumber, 'gidNumber' => $gid,
                  ];
                  $employees[] = $new_emp;
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  $ldap_ok = false;
                  if ($ldapconn) {
                      $entry = ['objectClass' => ['inetOrgPerson','posixAccount','shadowAccount'], 'cn' => $new_emp['prenom'].' '.$new_emp['nom'], 'sn' => $new_emp['nom'], 'givenName' => $new_emp['prenom'], 'uid' => $uid, 'uidNumber' => (string)$uidNumber, 'gidNumber' => (string)$gid, 'homeDirectory' => "/home/$uid", 'loginShell' => '/bin/bash', 'userPassword' => make_ssha($_POST['password'] ?? 'changeme'), 'mail' => $new_emp['email'], 'title' => $new_emp['poste']];
                      if ($new_emp['telephone']) $entry['telephoneNumber'] = $new_emp['telephone'];
                      $ldap_ok = @ldap_add($ldapconn, "uid=$uid,ou=people,dc=nodomain", $entry);
                  }
                  $msg = $ldap_ok ? 'ok:Employé ajouté avec succès · JSON + LDAP synchronisés' : 'warn:Ajouté localement · Erreur LDAP';
                  header("Location: employes.php?section=$section&msg=" . urlencode($msg)); exit;
              }

              if ($action === 'edit') {
                  $idx = (int)$_POST['idx'];
                  if (isset($employees[$idx])) {
                      $old = $employees[$idx];
                      if ($photo_path === '') $photo_path = $old['photo'] ?? '';
                      $employees[$idx] = array_merge($old, ['prenom' => trim($_POST['prenom']), 'nom' => trim($_POST['nom']), 'departement' => $_POST['departement'], 'poste' => $_POST['poste'], 'email' => trim($_POST['email']), 'telephone' => trim($_POST['telephone'] ?? ''), 'photo' => $photo_path, 'updated_at' => date('Y-m-d H:i:s')]);
                      file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                      $ldapconn = ldap_connect_admin();
                      if ($ldapconn) {
                          $mod = ['cn' => $employees[$idx]['prenom'].' '.$employees[$idx]['nom'], 'sn' => $employees[$idx]['nom'], 'givenName' => $employees[$idx]['prenom'], 'mail' => $employees[$idx]['email'], 'title' => $employees[$idx]['poste']];
                          if ($employees[$idx]['telephone']) $mod['telephoneNumber'] = $employees[$idx]['telephone'];
                          if (!empty($_POST['password'])) $mod['userPassword'] = make_ssha($_POST['password']);
                          @ldap_modify($ldapconn, "uid={$old['uid']},ou=people,dc=nodomain", $mod);
                      }
                  }
                  header("Location: employes.php?section=$section&msg=" . urlencode('ok:Employé mis à jour avec succès')); exit;
              }
          }

          // ── GET actions ──────────────────────────────────────────────────
          $section_get = $_GET['section'] ?? 'dashboard';

          if (isset($_GET['suspend'])) {
              $idx = (int)$_GET['suspend']; $type = $_GET['type'] ?? 'temporaire';
              if (isset($employees[$idx])) {
                  $employees[$idx]['statut'] = 'suspendu'; $employees[$idx]['suspension'] = $type;
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_modify($ldapconn, "uid={$employees[$idx]['uid']},ou=people,dc=nodomain", ['loginShell' => '/sbin/nologin']);
              }
              header("Location: employes.php?section=employees&msg=" . urlencode('warn:Employé suspendu · Suspension '.$type.' appliquée')); exit;
          }

          if (isset($_GET['reactivate'])) {
              $idx = (int)$_GET['reactivate'];
              if (isset($employees[$idx])) {
                  $employees[$idx]['statut'] = 'actif'; $employees[$idx]['suspension'] = '';
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_modify($ldapconn, "uid={$employees[$idx]['uid']},ou=people,dc=nodomain", ['loginShell' => '/bin/bash']);
              }
              header("Location: employes.php?section=employees&msg=" . urlencode('ok:Employé réactivé · Accès restauré')); exit;
          }

          if (isset($_GET['delete'])) {
              $idx = (int)$_GET['delete'];
              if (isset($employees[$idx])) {
                  $uid_del = $employees[$idx]['uid'];
                  if (!empty($employees[$idx]['photo'])) { $f='/var/www/html'.$employees[$idx]['photo']; if(file_exists($f)) unlink($f); }
                  array_splice($employees, $idx, 1);
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_delete($ldapconn, "uid=$uid_del,ou=people,dc=nodomain");
              }
              header("Location: employes.php?section=employees&msg=" . urlencode('ok:Employé supprimé · Retiré du JSON et du LDAP')); exit;
          }

          // ── Message flash ────────────────────────────────────────────────
          $flash = '';
          if (!empty($_GET['msg'])) {
              $parts = explode(':', urldecode($_GET['msg']), 2);
              $flash_type = $parts[0] ?? 'ok';
              $flash_text = $parts[1] ?? '';
              $flash = '<div class="flash flash-'.$flash_type.'"><div class="flash-ico">'.($flash_type==='ok'?'✓':'⚠').'</div><div><div class="flash-ttl">'.htmlspecialchars($flash_text).'</div></div></div>';
          }

          // ── Stats ────────────────────────────────────────────────────────
          $total = count($employees);
          $actifs = count(array_filter($employees, fn($e) => ($e['statut'] ?? 'actif') === 'actif'));
          $suspendus = $total - $actifs;
          $depts_count = [];
          foreach ($employees as $e) { $d = $e['departement'] ?? 'autre'; $depts_count[$d] = ($depts_count[$d] ?? 0) + 1; }
          arsort($depts_count);
          $monthly = [];
          foreach ($employees as $e) { if (!empty($e['created_at'])) { $m = substr($e['created_at'],0,7); $monthly[$m] = ($monthly[$m]??0)+1; } }
          ksort($monthly);

          $avatar_colors = ['#e8601c','#1d4ed8','#7c3aed','#1a7f4b','#c92121','#b45309','#0891b2','#be185d'];
          function av_color($str, $colors) { return $colors[abs(crc32($str)) % count($colors)]; }
          ?>
          <!DOCTYPE html>
          <html lang="fr">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>SEIMP — Gestion des Employés</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
          <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
          <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
          <style>
          :root {
            --bg:#f8f6f2; --surface:#ffffff; --surface2:#fdfcfa;
            --border:#ece8e1; --border2:#e0dbd3;
            --ink:#18120c; --ink2:#3d3229; --muted:#9c8f82; --faint:#c8bfb5;
            --orange:#e8601c; --orange2:#c94e10; --orange-lt:#fff5ef; --orange-bd:#fcd0b4;
            --green:#1a7f4b; --green-lt:#f0faf5; --green-bd:#9edfc0;
            --red:#c92121; --red-lt:#fff2f2; --red-bd:#f5b8b8;
            --amber:#b45309; --amber-lt:#fffbeb; --amber-bd:#fcd34d;
            --blue:#1d4ed8; --blue-lt:#eff6ff; --blue-bd:#bfdbfe;
            --purple:#7c3aed; --purple-lt:#faf5ff; --purple-bd:#ddd6fe;
            --r:16px; --r-sm:10px; --r-xs:6px;
            --sh:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.07);
            --sh-sm:0 1px 2px rgba(0,0,0,.05),0 3px 8px rgba(0,0,0,.06);
          }
          body.dark {
            --bg:#0f0d0b; --surface:#1a1612; --surface2:#201c18;
            --border:#2e2820; --border2:#3a322a;
            --ink:#f0ece6; --ink2:#c9bfb3; --muted:#7a6f65; --faint:#4a4038;
            --orange-lt:rgba(232,96,28,.12); --orange-bd:rgba(232,96,28,.3);
            --green-lt:rgba(26,127,75,.15); --green-bd:rgba(26,127,75,.35);
            --red-lt:rgba(201,33,33,.15); --red-bd:rgba(201,33,33,.35);
            --amber-lt:rgba(180,83,9,.15); --amber-bd:rgba(180,83,9,.35);
            --blue-lt:rgba(29,78,216,.15); --blue-bd:rgba(29,78,216,.35);
            --purple-lt:rgba(124,58,237,.15); --purple-bd:rgba(124,58,237,.35);
            --sh:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.4);
          }
          body.dark .sidebar { background:#0a0806; }
          body.dark tbody tr:hover { background:rgba(255,255,255,.03); }
          body.dark .field-input { background:var(--surface2); border-color:var(--border2); }
          body.dark .photo-upload { background:var(--surface2); }
          body.dark .search-bar { background:var(--surface2); }
          body.dark table thead tr { background:var(--surface2); }
          *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
          body { font-family:'Sora',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }
          body::after { content:''; position:fixed; inset:0; z-index:999; pointer-events:none; opacity:.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-size:180px; }

          .layout { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }

          /* SIDEBAR */
          .sidebar { background:var(--ink); padding:32px 24px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden; }
          .sidebar::before { content:''; position:absolute; top:-60px; left:-60px; width:220px; height:220px; background:radial-gradient(circle,rgba(232,96,28,.25) 0%,transparent 70%); pointer-events:none; }
          .sb-logo { display:flex; align-items:center; gap:10px; margin-bottom:44px; }
          .sb-logo-icon { width:34px; height:34px; background:var(--orange); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; color:#fff; }
          .sb-logo-text { font-size:.72rem; font-weight:600; color:rgba(255,255,255,.9); letter-spacing:.04em; }
          .sb-logo-sub { font-size:.6rem; color:rgba(255,255,255,.35); }
          .sb-label { font-size:.55rem; letter-spacing:.18em; text-transform:uppercase; color:rgba(255,255,255,.25); margin:24px 0 8px; }
          .sb-label:first-of-type { margin-top:0; }
          .nav-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:var(--r-sm); font-size:.72rem; color:rgba(255,255,255,.45); margin-bottom:2px; transition:all .15s; cursor:pointer; }
          .nav-item:hover { background:rgba(255,255,255,.06); color:rgba(255,255,255,.75); }
          .nav-item.active { background:rgba(232,96,28,.18); color:var(--orange); }
          .nav-item .ni { width:18px; text-align:center; font-size:.8rem; }
          .sb-foot { margin-top:auto; padding:13px 15px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07); border-radius:var(--r-sm); font-size:.63rem; color:rgba(255,255,255,.35); }

          /* MAIN */
          .main { padding:40px 44px 80px; overflow-x:hidden; min-width:0; }

          /* TOPROW */
          .toprow { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; animation:up .5s ease both; }
          .breadcrumb { display:flex; align-items:center; gap:7px; font-size:.65rem; color:var(--muted); }
          .breadcrumb .sep { color:var(--faint); }
          .breadcrumb .cur { color:var(--ink2); font-weight:500; }
          .top-actions { display:flex; gap:8px; align-items:center; }
          .dark-toggle { width:34px; height:34px; border-radius:var(--r-sm); background:var(--surface); border:1px solid var(--border2); color:var(--ink2); cursor:pointer; font-size:.95rem; box-shadow:var(--sh-sm); transition:all .2s; display:flex; align-items:center; justify-content:center; }
          .dark-toggle:hover { border-color:var(--orange); color:var(--orange); transform:rotate(20deg); }

          /* BUTTONS */
          .btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:var(--r-sm); font-family:inherit; font-size:.68rem; font-weight:500; cursor:pointer; transition:all .15s; text-decoration:none; border:none; }
          .btn-ghost { background:var(--surface); border:1px solid var(--border2); color:var(--ink2); box-shadow:var(--sh-sm); }
          .btn-ghost:hover { border-color:var(--orange); color:var(--orange); }
          .btn-primary { background:var(--orange); border:1px solid var(--orange2); color:#fff; box-shadow:0 2px 8px rgba(232,96,28,.3); }
          .btn-primary:hover { background:var(--orange2); }
          .btn-danger { background:var(--red-lt); border:1px solid var(--red-bd); color:var(--red); }
          .btn-danger:hover { background:var(--red); color:#fff; }
          .btn-warning { background:var(--amber-lt); border:1px solid var(--amber-bd); color:var(--amber); }
          .btn-warning:hover { background:var(--amber); color:#fff; }
          .btn-success { background:var(--green-lt); border:1px solid var(--green-bd); color:var(--green); }
          .btn-success:hover { background:var(--green); color:#fff; }
          .btn-sm { padding:5px 11px; font-size:.63rem; }
          .btn-full { width:100%; justify-content:center; }

          /* PAGE HEAD */
          .page-head { margin-bottom:28px; animation:up .5s .04s ease both; }
          .page-tag { display:inline-flex; align-items:center; gap:7px; font-size:.62rem; letter-spacing:.15em; text-transform:uppercase; color:var(--orange); margin-bottom:10px; }
          .page-tag::before { content:''; display:block; width:20px; height:1.5px; background:var(--orange); border-radius:2px; }
          .page-title { font-family:'Playfair Display',serif; font-size:clamp(1.8rem,4vw,2.6rem); font-weight:700; line-height:1.1; color:var(--ink); letter-spacing:-.02em; }
          .page-title span { font-style:italic; font-weight:400; color:var(--orange); }
          .page-desc { margin-top:8px; font-size:.72rem; color:var(--muted); display:flex; align-items:center; gap:8px; }
          .meta-sep { color:var(--faint); }

          /* FLASH */
          .flash { display:flex; align-items:center; gap:12px; padding:13px 18px; border-radius:var(--r-sm); margin-bottom:24px; animation:up .3s ease both; box-shadow:var(--sh-sm); }
          .flash-ok { background:var(--green-lt); border:1px solid var(--green-bd); color:var(--green); }
          .flash-warn { background:var(--amber-lt); border:1px solid var(--amber-bd); color:var(--amber); }
          .flash-ico { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.85rem; flex-shrink:0; }
          .flash-ok .flash-ico { background:var(--green); color:#fff; }
          .flash-warn .flash-ico { background:var(--amber); color:#fff; }
          .flash-ttl { font-size:.75rem; font-weight:500; }

          /* SECTION HEAD */
          .section-head { display:flex; align-items:center; gap:14px; margin:32px 0 18px; }
          .section-ttl { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--ink); white-space:nowrap; }
          .section-line { flex:1; height:1px; background:var(--border); }
          .section-pill { font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; background:var(--orange-lt); color:var(--orange); border:1px solid var(--orange-bd); border-radius:99px; padding:3px 12px; }

          /* METRICS */
          .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; animation:up .5s .16s ease both; }
          .metric { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:18px 20px 16px; position:relative; overflow:hidden; box-shadow:var(--sh-sm); transition:transform .18s,box-shadow .18s; }
          .metric:hover { transform:translateY(-2px); box-shadow:var(--sh); }
          .metric-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
          .metric-icon { width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.85rem; }
          .metric-val { font-family:'Playfair Display',serif; font-size:2.4rem; font-weight:700; line-height:1; margin-bottom:4px; }
          .metric-lbl { font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); }
          .metric.m-or .metric-icon { background:var(--orange-lt); }
          .metric.m-gr .metric-icon { background:var(--green-lt); }
          .metric.m-am .metric-icon { background:var(--amber-lt); }
          .metric.m-pu .metric-icon { background:var(--purple-lt); }
          .metric.m-or .metric-val { color:var(--orange); }
          .metric.m-gr .metric-val { color:var(--green); }
          .metric.m-am .metric-val { color:var(--amber); }
