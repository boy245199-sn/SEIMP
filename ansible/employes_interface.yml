---
- name: Déployer l'interface de gestion des employés SEIMP
  hosts: ldap
  become: yes
  tasks:
    - name: Installer PHP et extensions
      apt:
        name:
          - php
          - php-ldap
          - php-gd
          - php-mbstring
          - libapache2-mod-php
        state: present

    - name: Créer les répertoires
      file:
        path: "{{ item }}"
        state: directory
        mode: 0775
        owner: www-data
        group: www-data
      loop:
        - /var/www/html/photos
        - /var/www/html/data

    - name: Créer le fichier JSON vide
      copy:
        dest: /var/www/html/data/employees.json
        content: '[]'
        mode: 0664
        owner: www-data
        group: www-data

    - name: Activer le module rewrite Apache
      command: a2enmod rewrite
      ignore_errors: yes

    - name: Déployer employes.php
      copy:
        dest: /var/www/html/employes.php
        mode: 0644
        owner: www-data
        group: www-data
        content: |
          <?php
          session_start();
          if (!isset($_SERVER['PHP_AUTH_USER'])) {
              header('WWW-Authenticate: Basic realm="SEIMP RH"');
              header('HTTP/1.0 401 Unauthorized');
              exit('Accès non autorisé');
          }
          $valid_users = ['admin' => 'niang123', 'badge_manager' => 'badge123'];
          if (!isset($valid_users[$_SERVER['PHP_AUTH_USER']]) ||
              $valid_users[$_SERVER['PHP_AUTH_USER']] !== $_SERVER['PHP_AUTH_PW']) {
              header('WWW-Authenticate: Basic realm="SEIMP RH"');
              header('HTTP/1.0 401 Unauthorized');
              exit('Identifiants invalides');
          }

          function ldap_connect_admin() {
              $conn = ldap_connect("ldap://127.0.0.1:389");
              ldap_set_option($conn, LDAP_OPT_PROTOCOL_VERSION, 3);
              ldap_set_option($conn, LDAP_OPT_REFERRALS, 0);
              ldap_set_option($conn, LDAP_OPT_X_TLS_REQUIRE_CERT, LDAP_OPT_X_TLS_NEVER);
              $bind = @ldap_bind($conn, "cn=admin,dc=nodomain", "niang123");
              return $bind ? $conn : false;
          }

          function make_ssha($password) {
              $salt = random_bytes(8);
              return '{SSHA}' . base64_encode(sha1($password . $salt, true) . $salt);
          }

          $data_file = '/var/www/html/data/employees.json';
          $photo_dir = '/var/www/html/photos/';
          $employees = json_decode(file_get_contents($data_file), true) ?: [];
          $message = "";

          $departements = [
              'direction'    => ['label' => 'Direction Générale',         'gid' => 10000, 'icon' => '🏛️',  'color' => '#7c3aed'],
              'it'           => ['label' => 'Informatique & Tech',        'gid' => 10002, 'icon' => '💻',  'color' => '#2563eb'],
              'securite'     => ['label' => 'Sécurité',                   'gid' => 10003, 'icon' => '🛡️',  'color' => '#dc2626'],
              'menage'       => ['label' => 'Ménage & Propreté',          'gid' => 10004, 'icon' => '🧹',  'color' => '#0891b2'],
              'commercial'   => ['label' => 'Commercial',                 'gid' => 10001, 'icon' => '📈',  'color' => '#059669'],
              'finance'      => ['label' => 'Finance & Comptabilité',     'gid' => 10001, 'icon' => '💰',  'color' => '#d97706'],
              'rh'           => ['label' => 'Ressources Humaines',        'gid' => 10001, 'icon' => '👥',  'color' => '#db2777'],
              'logistique'   => ['label' => 'Logistique & Transport',     'gid' => 10001, 'icon' => '🚚',  'color' => '#ea580c'],
              'cantine'      => ['label' => 'Restauration',               'gid' => 10004, 'icon' => '🍽️',  'color' => '#65a30d'],
              'juridique'    => ['label' => 'Juridique',                  'gid' => 10001, 'icon' => '⚖️',  'color' => '#475569'],
              'marketing'    => ['label' => 'Marketing & Communication',  'gid' => 10001, 'icon' => '📣',  'color' => '#e11d48'],
              'production'   => ['label' => 'Production & Opérations',    'gid' => 10005, 'icon' => '⚙️',  'color' => '#57534e'],
              'qualite'      => ['label' => 'Qualité & Conformité',       'gid' => 10005, 'icon' => '✅',  'color' => '#0d9488'],
              'achats'       => ['label' => 'Achats & Approvisionnement', 'gid' => 10001, 'icon' => '🛒',  'color' => '#7c3aed'],
              'audit'        => ['label' => 'Audit & Contrôle Interne',   'gid' => 10001, 'icon' => '🔍',  'color' => '#0369a1'],
              'maintenance'  => ['label' => 'Maintenance & Technique',    'gid' => 10005, 'icon' => '🔧',  'color' => '#92400e'],
              'communication'=> ['label' => 'Communication Externe',      'gid' => 10001, 'icon' => '📡',  'color' => '#6d28d9'],
              'formation'    => ['label' => 'Formation & Développement',  'gid' => 10001, 'icon' => '🎓',  'color' => '#0891b2'],
              'medical'      => ['label' => 'Médical & Santé',            'gid' => 10006, 'icon' => '🏥',  'color' => '#be185d'],
              'reception'    => ['label' => 'Accueil & Réception',        'gid' => 10004, 'icon' => '🤝',  'color' => '#047857'],
              'projet'       => ['label' => 'Gestion de Projets',         'gid' => 10001, 'icon' => '📋',  'color' => '#1d4ed8'],
              'data'         => ['label' => 'Data & Business Intelligence','gid' => 10002, 'icon' => '📊',  'color' => '#7e22ce'],
          ];

          $postes = [
              // Direction
              'Directeur Général','Directeur Adjoint','Directeur Administratif','Directeur Technique',
              'Directeur Commercial','Directeur Financier','Directeur des Opérations',
              // Management
              'Manager','Chef de Département','Chef de Service','Chef de Projet','Chef d\'Équipe',
              'Coordinateur','Superviseur','Responsable de Site',
              // IT & Tech
              'Développeur Web','Développeur Mobile','Développeur Full Stack','Développeur Backend',
              'Développeur Frontend','Administrateur Système','Administrateur Réseau','Administrateur Base de Données',
              'Ingénieur DevOps','Architecte Logiciel','Technicien IT','Analyste Programmeur',
              'Responsable Sécurité Informatique','Data Scientist','Data Analyst','Data Engineer',
              'Business Intelligence Analyst','Chef de Projet IT',
              // Finance & Comptabilité
              'Comptable','Comptable Principal','Contrôleur Financier','Auditeur Interne','Auditeur Externe',
              'Analyste Financier','Trésorier','Gestionnaire de Paie','Fiscaliste',
              // Commercial & Ventes
              'Commercial','Chargé de Clientèle','Responsable Ventes','Responsable Grand Compte',
              'Chargé d\'Affaires','Représentant Commercial','Téléconseiller','Account Manager',
              // RH
              'Chargé RH','Responsable RH','Directeur RH','Recruteur','Chargé de Formation',
              'Responsable Paie','Chargé des Relations Sociales','Assistant RH',
              // Sécurité
              'Agent de Sécurité','Chef Sécurité','Vigile','Rondier','Responsable Sûreté',
              'Agent de Gardiennage','Superviseur Sécurité',
              // Logistique & Transport
              'Responsable Logistique','Gestionnaire de Stock','Magasinier','Chauffeur',
              'Livreur','Opérateur Logistique','Responsable Entrepôt','Agent Douanier',
              // Production & Maintenance
              'Technicien de Maintenance','Ingénieur de Production','Opérateur de Production',
              'Responsable Qualité','Contrôleur Qualité','Technicien Qualité',
              'Chef d\'Atelier','Technicien Électricien','Technicien Mécanicien',
              // Marketing & Communication
              'Chargé Marketing','Responsable Marketing','Community Manager','Designer Graphique',
              'Chargé de Communication','Attaché de Presse','Rédacteur','Photographe',
              // Juridique
              'Juriste','Conseiller Juridique','Responsable Juridique','Paralégal',
              // Médical & Santé
              'Médecin du Travail','Infirmier','Infirmière','Aide-soignant','Pharmacien',
              'Assistant Médical',
              // Restauration
              'Cuisinier','Chef Cuisinier','Serveur','Hôtesse','Responsable Cantine',
              'Aide Cuisiner',
              // Accueil & Administratif
              'Réceptionniste','Hôtesse d\'Accueil','Standardiste','Secrétaire',
              'Assistant Administratif','Assistant de Direction','Archiviste','Agent Administratif',
              // Achats
              'Acheteur','Responsable Achats','Approvisionneur','Gestionnaire des Contrats',
              // Formation
              'Formateur','Responsable Formation','Coordinateur Pédagogique',
              // Autres
              'Stagiaire','Apprenti','Consultant Externe','Prestataire',
          ];
          sort($postes);

          $photo_path = "";
          if (isset($_FILES['photo']) && $_FILES['photo']['error'] === UPLOAD_ERR_OK && $_FILES['photo']['size'] > 0) {
              $ext = strtolower(pathinfo($_FILES['photo']['name'], PATHINFO_EXTENSION));
              if (in_array($ext, ['jpg','jpeg','png','gif','webp'])) {
                  $photo_name = uniqid('emp_') . '.' . $ext;
                  if (move_uploaded_file($_FILES['photo']['tmp_name'], $photo_dir . $photo_name)) {
                      $photo_path = '/photos/' . $photo_name;
                  }
              }
          }

          if ($_SERVER['REQUEST_METHOD'] === 'POST' && ($_POST['action'] ?? '') === 'add') {
              $uid = preg_replace('/[^a-z0-9]/', '', strtolower(substr($_POST['prenom'],0,1) . $_POST['nom']));
              $uidNumber = rand(20000, 60000);
              $gid = $departements[$_POST['departement']]['gid'] ?? 10001;
              $new_emp = [
                  'uid'         => $uid,
                  'prenom'      => trim($_POST['prenom']),
                  'nom'         => trim($_POST['nom']),
                  'departement' => $_POST['departement'],
                  'poste'       => $_POST['poste'],
                  'email'       => trim($_POST['email']),
                  'telephone'   => trim($_POST['telephone'] ?? ''),
                  'photo'       => $photo_path,
                  'statut'      => 'actif',
                  'suspension'  => '',
                  'created_at'  => date('Y-m-d H:i:s'),
                  'uidNumber'   => $uidNumber,
                  'gidNumber'   => $gid,
              ];
              $employees[] = $new_emp;
              file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
              $ldapconn = ldap_connect_admin();
              if ($ldapconn) {
                  $dn = "uid=$uid,ou=people,dc=nodomain";
                  $pass = $_POST['password'] ?? 'changeme123';
                  $entry = [
                      'objectClass'   => ['inetOrgPerson','posixAccount','shadowAccount'],
                      'cn'            => $new_emp['prenom'] . ' ' . $new_emp['nom'],
                      'sn'            => $new_emp['nom'],
                      'givenName'     => $new_emp['prenom'],
                      'uid'           => $uid,
                      'uidNumber'     => (string)$uidNumber,
                      'gidNumber'     => (string)$gid,
                      'homeDirectory' => "/home/$uid",
                      'loginShell'    => '/bin/bash',
                      'userPassword'  => make_ssha($pass),
                      'title'         => $new_emp['poste'],
                  ];
                  if ($new_emp['telephone']) $entry['telephoneNumber'] = $new_emp['telephone'];
                  if ($new_emp['email']) $entry['mail'] = $new_emp['email'];
                  $ok = @ldap_add($ldapconn, $dn, $entry);
                  $message = $ok
                      ? '<div class="toast-msg success"><svg viewBox="0 0 20 20" fill="currentColor" width="16"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg> Employé <strong>' . htmlspecialchars($new_emp['prenom'].' '.$new_emp['nom']) . '</strong> ajouté avec succès.</div>'
                      : '<div class="toast-msg warning"><svg viewBox="0 0 20 20" fill="currentColor" width="16"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg> Ajouté en local mais erreur LDAP : ' . ldap_error($ldapconn) . '</div>';
              } else {
                  $message = '<div class="toast-msg warning">Ajouté en local. Connexion LDAP échouée.</div>';
              }
          }

          if ($_SERVER['REQUEST_METHOD'] === 'POST' && ($_POST['action'] ?? '') === 'edit') {
              $idx = (int)$_POST['idx'];
              if (isset($employees[$idx])) {
                  $old = $employees[$idx];
                  if ($photo_path === '' && isset($old['photo'])) $photo_path = $old['photo'];
                  $employees[$idx] = array_merge($old, [
                      'prenom'      => trim($_POST['prenom']),
                      'nom'         => trim($_POST['nom']),
                      'departement' => $_POST['departement'],
                      'poste'       => $_POST['poste'],
                      'email'       => trim($_POST['email']),
                      'telephone'   => trim($_POST['telephone'] ?? ''),
                      'photo'       => $photo_path,
                      'updated_at'  => date('Y-m-d H:i:s'),
                  ]);
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) {
                      $dn = "uid={$old['uid']},ou=people,dc=nodomain";
                      $mod = [
                          'cn'        => $employees[$idx]['prenom'] . ' ' . $employees[$idx]['nom'],
                          'sn'        => $employees[$idx]['nom'],
                          'givenName' => $employees[$idx]['prenom'],
                          'mail'      => $employees[$idx]['email'],
                          'title'     => $employees[$idx]['poste'],
                      ];
                      if ($employees[$idx]['telephone']) $mod['telephoneNumber'] = $employees[$idx]['telephone'];
                      if (!empty($_POST['password'])) $mod['userPassword'] = make_ssha($_POST['password']);
                      @ldap_modify($ldapconn, $dn, $mod);
                  }
                  $message = '<div class="toast-msg success">Employé mis à jour avec succès.</div>';
              }
          }

          if (isset($_GET['suspend'])) {
              $idx = (int)$_GET['suspend'];
              $type = $_GET['type'] ?? 'temporaire';
              if (isset($employees[$idx])) {
                  $employees[$idx]['statut'] = 'suspendu';
                  $employees[$idx]['suspension'] = $type;
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_modify($ldapconn, "uid={$employees[$idx]['uid']},ou=people,dc=nodomain", ['loginShell' => '/sbin/nologin']);
                  $message = '<div class="toast-msg warning">Employé suspendu (' . $type . ').</div>';
              }
          }

          if (isset($_GET['reactivate'])) {
              $idx = (int)$_GET['reactivate'];
              if (isset($employees[$idx])) {
                  $employees[$idx]['statut'] = 'actif';
                  $employees[$idx]['suspension'] = '';
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_modify($ldapconn, "uid={$employees[$idx]['uid']},ou=people,dc=nodomain", ['loginShell' => '/bin/bash']);
                  $message = '<div class="toast-msg success">Employé réactivé avec succès.</div>';
              }
          }

          if (isset($_GET['delete'])) {
              $idx = (int)$_GET['delete'];
              if (isset($employees[$idx])) {
                  $uid_del = $employees[$idx]['uid'];
                  if (!empty($employees[$idx]['photo'])) {
                      $f = '/var/www/html' . $employees[$idx]['photo'];
                      if (file_exists($f)) unlink($f);
                  }
                  array_splice($employees, $idx, 1);
                  file_put_contents($data_file, json_encode($employees, JSON_PRETTY_PRINT | JSON_UNESCAPED_UNICODE));
                  $ldapconn = ldap_connect_admin();
                  if ($ldapconn) @ldap_delete($ldapconn, "uid=$uid_del,ou=people,dc=nodomain");
                  header('Location: employes.php?deleted=1'); exit;
              }
          }

          $total     = count($employees);
          $actifs    = count(array_filter($employees, fn($e) => ($e['statut'] ?? 'actif') === 'actif'));
          $suspendus = $total - $actifs;
          $depts_count = [];
          foreach ($employees as $e) { $d = $e['departement'] ?? 'autre'; $depts_count[$d] = ($depts_count[$d] ?? 0) + 1; }
          arsort($depts_count);
          ?>
          <!DOCTYPE html>
          <html lang="fr">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>SEIMP — Gestion des Employés</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;500;600;700;800&display=swap" rel="stylesheet">
          <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
          <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
          <style>
          :root {
            --bg: #f0f6ff;
            --bg2: #ffffff;
            --surface: #ffffff;
            --surface2: #f5f9ff;
            --surface3: #e8f1fd;
            --border: #d0e2f7;
            --border2: #b0cef0;
            --accent: #1a73e8;
            --accent2: #1557b0;
            --accent-glow: rgba(26,115,232,0.12);
            --accent-light: rgba(26,115,232,0.07);
            --text: #0f2444;
            --text2: #4a6080;
            --text3: #7a94b0;
            --success: #137a3a;
            --success-bg: #eaf7ee;
            --success-border: #a8ddb8;
            --warning: #a05c00;
            --warning-bg: #fff8e6;
            --warning-border: #f5d48a;
            --danger: #c0392b;
            --danger-bg: #fdf0ee;
            --danger-border: #f0b0aa;
            --purple: #6b4fc8;
            --purple-bg: #f0ecfa;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 1px 4px rgba(26,115,232,0.06), 0 4px 16px rgba(26,115,232,0.08);
            --shadow-lg: 0 8px 32px rgba(26,115,232,0.13);
          }
          * { box-sizing: border-box; margin: 0; padding: 0; }
          html { scroll-behavior: smooth; }
          body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
          }

          /* ─── SCROLLBAR ─── */
          ::-webkit-scrollbar { width: 6px; height: 6px; }
          ::-webkit-scrollbar-track { background: var(--bg); }
          ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
          ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

          /* ─── SIDEBAR ─── */
          .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 240px;
            background: linear-gradient(180deg, #1a56c8 0%, #1244a8 60%, #0e3a8c 100%);
            border-right: none;
            display: flex; flex-direction: column; z-index: 100;
            box-shadow: 4px 0 20px rgba(26,84,200,0.18);
          }
          .sidebar-logo {
            padding: 20px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
          }
          .logo-mark {
            display: flex; align-items: center; gap: 10px; margin-bottom: 4px;
          }
          .logo-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,0.18);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; color: white;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.25), 0 4px 12px rgba(0,0,0,0.15);
          }
          .logo-text {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 18px; font-weight: 700; color: #ffffff; letter-spacing: -0.3px;
          }
          .logo-sub { font-size: 10px; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 1.5px; margin-left: 42px; }
          .sidebar-section-label {
            font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1.5px;
            padding: 14px 16px 6px; font-weight: 600;
          }
          .sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
          .nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: var(--radius-sm);
            cursor: pointer; color: rgba(255,255,255,0.6);
            font-size: 13.5px; font-weight: 500;
            transition: all 0.15s; margin-bottom: 1px;
            position: relative;
          }
          .nav-item:hover { color: #fff; background: rgba(255,255,255,0.1); }
          .nav-item.active {
            color: #fff; background: rgba(255,255,255,0.18);
            border: 1px solid rgba(255,255,255,0.2);
          }
          .nav-item.active::before {
            content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 18px; background: #fff; border-radius: 0 2px 2px 0;
          }
          .nav-item i { width: 16px; text-align: center; font-size: 13px; }
          .nav-badge {
            margin-left: auto; background: rgba(255,255,255,0.2); color: white;
            font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px;
          }
          .sidebar-footer {
            padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.12);
            display: flex; align-items: center; gap: 10px;
          }
          .footer-avatar {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700; color: white; flex-shrink: 0;
          }
          .footer-info { flex: 1; min-width: 0; }
          .footer-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.9); }
          .footer-role { font-size: 10px; color: rgba(255,255,255,0.4); }
          .footer-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; flex-shrink: 0; }

          /* ─── MAIN ─── */
          .main { margin-left: 240px; min-height: 100vh; }
          .topbar {
            background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 28px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
          }
          .topbar-left { display: flex; align-items: center; gap: 12px; }
          .topbar-title {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 16px; font-weight: 700; color: var(--text);
          }
          .breadcrumb { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
          .breadcrumb i { font-size: 10px; }
          .topbar-actions { display: flex; align-items: center; gap: 8px; }
          .topbar-time { font-size: 11px; color: var(--text3); padding: 4px 10px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }
          .content { padding: 24px 28px; }

