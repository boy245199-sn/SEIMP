          <script>
          const employees = <?php echo json_encode($employees, JSON_UNESCAPED_UNICODE); ?>;
          const departements_js = <?php echo json_encode(array_map(fn($d) => ['label'=>$d['label'],'icon'=>$d['icon'],'color'=>$d['color']], $departements), JSON_UNESCAPED_UNICODE); ?>;

          // Clock
          function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
          }
          setInterval(updateClock, 1000); updateClock();

          function showSection(name, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('section-' + name).classList.add('active');
            const titles = {dashboard:'Tableau de bord', employees:'Employés', add:'Nouvel employé', badges:'Générateur de badges'};
            document.getElementById('page-title').textContent = titles[name] || name;
            if (el) el.classList.add('active');
          }

          function previewPhoto(input) {
            if (input.files && input.files[0]) {
              const reader = new FileReader();
              reader.onload = e => {
                document.getElementById('photo-preview-container').innerHTML =
                  '<img src="' + e.target.result + '" class="photo-preview-img"><div style="font-size:12px;color:var(--success);margin-top:4px;"><i class="fas fa-check-circle"></i> Photo sélectionnée</div>';
              };
              reader.readAsDataURL(input.files[0]);
            }
          }

          function openEdit(idx) {
            const emp = employees[idx];
            document.getElementById('edit-idx').value = idx;
            document.getElementById('edit-prenom').value = emp.prenom || '';
            document.getElementById('edit-nom').value = emp.nom || '';
            document.getElementById('edit-email').value = emp.email || '';
            document.getElementById('edit-telephone').value = emp.telephone || '';
            document.getElementById('edit-departement').value = emp.departement || '';
            document.getElementById('edit-poste').value = emp.poste || '';
            document.getElementById('edit-modal').classList.add('open');
          }

          function closeModal(id) { document.getElementById(id).classList.remove('open'); }

          function openSuspend(idx) {
            document.getElementById('suspend-temp-btn').href = '?suspend=' + idx + '&type=temporaire';
            document.getElementById('suspend-def-btn').href = '?suspend=' + idx + '&type=definitif';
            document.getElementById('suspend-modal').classList.add('open');
          }

          function confirmDelete(idx) {
            document.getElementById('confirm-delete-link').href = '?delete=' + idx;
            document.getElementById('confirm-delete').classList.add('open');
          }

          function filterTable() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('#emp-table tbody tr[data-search]').forEach(row => {
              row.style.display = row.dataset.search.includes(q) ? '' : 'none';
            });
          }

          let activeStatus = 'all', activeDept = '';
          function filterStatus(status, btn) {
            activeStatus = status; activeDept = '';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); applyFilters();
          }
          function filterDept(dept, btn) {
            activeDept = dept; activeStatus = 'all';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); applyFilters();
          }
          function applyFilters() {
            document.querySelectorAll('#emp-table tbody tr[data-status]').forEach(row => {
              const statusOk = activeStatus === 'all' || row.dataset.status === activeStatus;
              const deptOk = activeDept === '' || row.dataset.dept === activeDept;
              row.style.display = (statusOk && deptOk) ? '' : 'none';
            });
          }

          // ══ Badge generation with cross-origin QR fix ══
          function generateBadge(idx) {
            const emp = employees[idx];
            showSection('badges', document.querySelectorAll('.nav-item')[3]);

            // Highlight selected in list
            document.querySelectorAll('.emp-pick-item').forEach(el => el.classList.remove('selected'));
            const pickEl = document.getElementById('pick-' + idx);
            if (pickEl) pickEl.classList.add('selected');

            const dept = departements_js[emp.departement] || {label: emp.departement || '', icon: '🏢', color: '#1a73e8'};
            const initials = ((emp.prenom||'?').charAt(0) + (emp.nom||'?').charAt(0)).toUpperCase();
            const createdAt = emp.created_at ? emp.created_at.split(' ')[0] : 'N/A';
            const tel = emp.telephone || 'Non renseigné';
            const qrData = encodeURIComponent(JSON.stringify({uid:emp.uid,name:(emp.prenom||'')+' '+(emp.nom||''),poste:emp.poste||'',tel:tel}));
            const qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=100x100&bgcolor=1244a8&color=93c5fd&qzone=1&data=' + qrData;

            const photoHtml = (emp.photo && emp.photo !== '')
              ? '<img src="' + emp.photo + '" class="badge-photo" crossorigin="anonymous" onerror="this.outerHTML=\'<div class=badge-photo-placeholder>' + initials + '</div>\'">'
              : '<div class="badge-photo-placeholder">' + initials + '</div>';

            const cardHtml =
              '<div id="badge-card-render" class="badge-card">' +
                '<div class="badge-top">' +
                  '<div class="badge-company-name">SEIMP Enterprise</div>' +
                  '<div class="badge-type-chip">Badge Officiel</div>' +
                '</div>' +
                '<div class="badge-center">' +
                  '<div class="badge-photo-wrap">' + photoHtml + '</div>' +
                  '<div class="badge-info">' +
                    '<div class="badge-name">' + (emp.prenom||'') + ' ' + (emp.nom||'') + '</div>' +
                    '<div class="badge-title">' + (emp.poste||'N/A') + '</div>' +
                    '<div class="badge-dept">' + dept.icon + ' ' + dept.label + '</div>' +
                  '</div>' +
                '</div>' +
                '<div class="badge-divider"></div>' +
                '<div class="badge-fields">' +
                  '<div class="badge-field"><div class="badge-field-label">Identifiant</div><div class="badge-field-value" style="font-family:monospace;color:#93c5fd;">' + (emp.uid||'—') + '</div></div>' +
                  '<div class="badge-field"><div class="badge-field-label">Téléphone</div><div class="badge-field-value">' + tel + '</div></div>' +
                '</div>' +
                '<div class="badge-bottom">' +
                  '<div class="badge-meta">' +
                    '<div class="badge-uid">#' + (emp.uid||'').toUpperCase() + '</div>' +
                    '<div class="badge-date">Émis le ' + createdAt + '</div>' +
                  '</div>' +
                  '<div class="badge-qr-wrap"><div class="badge-qr-inner" id="qr-container"><img id="qr-img" width="100" height="100" style="display:block;border-radius:4px;"></div></div>' +
                '</div>' +
                '<div class="badge-disclaimer">Badge officiel SEIMP — Ne pas reproduire sans autorisation</div>' +
              '</div>';

            document.getElementById('badge-preview-area').innerHTML = cardHtml;

            // Load QR as base64 to bypass html2canvas cross-origin issue
            const qrImg = document.getElementById('qr-img');
            fetch(qrUrl)
              .then(r => r.blob())
              .then(blob => {
                const reader = new FileReader();
                reader.onloadend = () => { qrImg.src = reader.result; };
                reader.readAsDataURL(blob);
              })
              .catch(() => { qrImg.src = ''; document.getElementById('qr-container').innerHTML = '<div style="width:100px;height:100px;background:#1244a8;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#1a73e8;text-align:center;padding:6px;">QR Code</div>'; });

            document.getElementById('download-badge-btn').style.display = 'inline-flex';
          }

          function downloadBadge() {
            const card = document.getElementById('badge-card-render');
            html2canvas(card, {
              scale: 3,
              backgroundColor: '#1244a8',
              useCORS: true,
              allowTaint: false,
              logging: false
            }).then(canvas => {
              const a = document.createElement('a');
              a.download = 'badge_seimp_' + Date.now() + '.png';
              a.href = canvas.toDataURL('image/png');
              a.click();
            });
          }

          document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
          });
          </script>
          </body>
          </html>

    - name: Redémarrer Apache
      systemd:
        name: apache2
        state: restarted
        enabled: yes
