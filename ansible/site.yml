---
- name: Configuration du serveur LDAP
  hosts: ldap
  become: yes
  roles:
    - ldap
  tags: ldap

- name: Installation de Nextcloud
  hosts: nextcloud
  become: yes
  roles:
    - nextcloud
  tags: nextcloud

- name: Installation de Odoo ERP
  hosts: odoo
  become: yes
  roles:
    - odoo
  tags: odoo

- name: Installation de l'API Badges
  hosts: badge-backend
  become: yes
  roles:
    - badge-backend
  tags: badge

- name: Déployer l'interface de gestion des employés
  hosts: ldap
  become: yes
  tasks:
    - name: Installer PHP et modules LDAP
      apt:
        name:
          - php
          - php-ldap
          - libapache2-mod-php
        state: present

    - name: Créer l'interface de gestion des employés
      copy:
        dest: /var/www/html/employes.php
        owner: www-data
        group: www-data
        mode: 0644
        content: |
          <?php
          $ldap_host = "localhost";
          $ldap_port = 389;
          $ldap_dn = "cn=admin,dc=nodomain";
          $ldap_password = "admin123";
          $base_dn = "dc=nodomain";
          $people_dn = "ou=people,dc=nodomain";

          $ldapconn = ldap_connect($ldap_host, $ldap_port);
          ldap_set_option($ldapconn, LDAP_OPT_PROTOCOL_VERSION, 3);
          @ldap_bind($ldapconn, $ldap_dn, $ldap_password);

          $departements = [
              'direction' => ['name' => '🏢 Direction Générale', 'gid' => 10000, 'icon' => 'fa-building', 'postes' => [
                  'pdg' => 'Président Directeur Général',
                  'dg_adjoint' => 'Directeur Général Adjoint',
                  'secretaire_direction' => 'Secrétaire de Direction'
              ]],
              'rh' => ['name' => '👥 Ressources Humaines', 'gid' => 10001, 'icon' => 'fa-users', 'postes' => [
                  'drh' => 'Directeur des Ressources Humaines',
                  'responsable_paie' => 'Responsable Paie',
                  'charge_recrutement' => 'Chargé de Recrutement',
                  'assistant_rh' => 'Assistant RH',
                  'formation' => 'Responsable Formation'
              ]],
              'it' => ['name' => '💻 Informatique', 'gid' => 10002, 'icon' => 'fa-laptop-code', 'postes' => [
                  'dsi' => 'Directeur des Systèmes d\'Information',
                  'architecte_reseau' => 'Architecte Réseau',
                  'devops' => 'Ingénieur DevOps',
                  'developpeur' => 'Développeur',
                  'technicien_support' => 'Technicien Support',
                  'admin_bdd' => 'Administrateur Base de Données',
                  'cybersecurite' => 'Responsable Cybersécurité',
                  'data_scientist' => 'Data Scientist'
              ]],
              'securite' => ['name' => '🛡️ Sécurité', 'gid' => 10003, 'icon' => 'fa-shield-alt', 'postes' => [
                  'chef_securite' => 'Chef de la Sécurité',
                  'superviseur' => 'Superviseur Sécurité',
                  'agent_poste_central' => 'Agent Poste Central',
                  'agent_rond_point' => 'Agent Rond-point',
                  'agent_accueil' => 'Agent d\'Accueil',
                  'agent_parking' => 'Agent Parking',
                  'agent_nuit' => 'Agent de Nuit',
                  'agent_rondes' => 'Agent de Rondes'
              ]],
              'menage' => ['name' => '🧹 Ménage & Propreté', 'gid' => 10004, 'icon' => 'fa-broom', 'postes' => [
                  'chef_menage' => 'Chef d\'Équipe Ménage',
                  'superviseur_menage' => 'Superviseur Propreté',
                  'agent_nettoyage_bureaux' => 'Agent Nettoyage Bureaux',
                  'agent_sanitaires' => 'Agent Sanitaires',
                  'agent_couloirs' => 'Agent Couloirs',
                  'agent_parking_ext' => 'Agent Parking',
                  'agent_vitreries' => 'Agent Vitreries',
                  'agent_nuit_menage' => 'Agent de Nuit'
              ]],
              'commercial' => ['name' => '📈 Commercial', 'gid' => 10001, 'icon' => 'fa-chart-line', 'postes' => [
                  'directeur_commercial' => 'Directeur Commercial',
                  'responsable_grandes_comptes' => 'Responsable Grands Comptes',
                  'commercial_terrain' => 'Commercial Terrain',
                  'commercial_interne' => 'Commercial Interne',
                  'charge_clientele' => 'Chargé de Clientèle',
                  'business_dev' => 'Business Developer'
              ]],
              'finance' => ['name' => '💰 Finance', 'gid' => 10001, 'icon' => 'fa-coins', 'postes' => [
                  'directeur_financier' => 'Directeur Financier',
                  'chef_comptable' => 'Chef Comptable',
                  'comptable_fournisseurs' => 'Comptable Fournisseurs',
                  'comptable_clients' => 'Comptable Clients',
                  'tresorier' => 'Trésorier',
                  'analyste_financier' => 'Analyste Financier'
              ]],
              'logistique' => ['name' => '📦 Logistique', 'gid' => 10001, 'icon' => 'fa-truck', 'postes' => [
                  'directeur_logistique' => 'Directeur Logistique',
                  'responsable_entrepot' => 'Responsable Entrepôt',
                  'preparateur_commandes' => 'Préparateur Commandes',
                  'cariste' => 'Cariste',
                  'magasinier' => 'Magasinier',
                  'transport' => 'Responsable Transport'
              ]],
              'marketing' => ['name' => '🎯 Marketing', 'gid' => 10001, 'icon' => 'fa-megaphone', 'postes' => [
                  'directeur_marketing' => 'Directeur Marketing',
                  'community_manager' => 'Community Manager',
                  'graphiste' => 'Graphiste',
                  'webmaster' => 'Webmaster',
                  'charge_communication' => 'Chargé de Communication',
                  'seo_specialist' => 'SEO Specialist'
              ]],
              'cantine' => ['name' => '🍽️ Restauration', 'gid' => 10004, 'icon' => 'fa-utensils', 'postes' => [
                  'chef_cuisine' => 'Chef de Cuisine',
                  'commis_cuisine' => 'Commis de Cuisine',
                  'serveur' => 'Serveur',
                  'plongeur' => 'Plongeur',
                  'gerant_cantine' => 'Gérant de la Cantine'
              ]]
          ];

          function generate_uid($prenom, $nom) {
              $uid = strtolower(substr($prenom, 0, 1) . $nom);
              return preg_replace('/[^a-z0-9]/', '', $uid);
          }

          $message = "";
          if ($_SERVER['REQUEST_METHOD'] === 'POST') {
              $uid = generate_uid($_POST['prenom'], $_POST['nom']);
              $uidNumber = rand(20000, 30000);
              $gidNumber = $departements[$_POST['departement']]['gid'];
              $salt = substr(sha1(uniqid()), 0, 8);
              $password_hash = "{SSHA}" . base64_encode(sha1($_POST['password'] . $salt, true) . $salt);
              
              $dn = "uid=" . $uid . ",ou=people,dc=nodomain";
              $info = [
                  "objectClass" => ["inetOrgPerson", "posixAccount", "shadowAccount"],
                  "uid" => $uid,
                  "sn" => $_POST['nom'],
                  "givenName" => $_POST['prenom'],
                  "cn" => $_POST['prenom'] . " " . $_POST['nom'],
                  "displayName" => $_POST['poste'],
                  "uidNumber" => $uidNumber,
                  "gidNumber" => $gidNumber,
                  "homeDirectory" => "/home/" . $uid,
                  "userPassword" => $password_hash,
                  "loginShell" => "/bin/bash",
                  "title" => $_POST['poste'],
                  "department" => $departements[$_POST['departement']]['name'],
                  "telephoneNumber" => $_POST['telephone'],
                  "mail" => $_POST['email']
              ];
              
              if (@ldap_add($ldapconn, $dn, $info)) {
                  $message = '<div class="alert alert-success">✅ Employé ajouté avec succès ! UID: ' . $uid . '</div>';
              } else {
                  $message = '<div class="alert alert-danger">❌ Erreur: ' . ldap_error($ldapconn) . '</div>';
              }
          }
          ?>
          <!DOCTYPE html>
          <html>
          <head><title>SEIMP - Gestion des Employés</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></head>
          <body><div class="container mt-5"><div class="row"><div class="col-md-8 mx-auto"><div class="card"><div class="card-header bg-primary text-white"><h4>📝 Gestion des Employés</h4></div><div class="card-body"><?php echo $message; ?>
          <form method="POST"><div class="row"><div class="col-md-6"><label>Prénom</label><input type="text" name="prenom" class="form-control" required></div><div class="col-md-6"><label>Nom</label><input type="text" name="nom" class="form-control" required></div></div>
          <div class="mb-3"><label>Département</label><select name="departement" id="dept" class="form-select" required><option value="">Sélectionner</option>
          <?php foreach($departements as $key => $dept): ?><option value="<?php echo $key; ?>"><?php echo $dept['name']; ?></option><?php endforeach; ?>
          </select></div>
          <div class="mb-3"><label>Poste</label><select name="poste" id="poste" class="form-select" required><option value="">Sélectionner d'abord un département</option></select></div>
          <div class="row"><div class="col-md-6"><label>Email</label><input type="email" name="email" class="form-control" required></div><div class="col-md-6"><label>Mot de passe</label><input type="password" name="password" class="form-control" required></div></div>
          <div class="mb-3"><label>Téléphone</label><input type="text" name="telephone" class="form-control"></div>
          <button type="submit" class="btn btn-primary w-100">Enregistrer</button></form></div></div></div></div></div>
          <script>const depts = <?php echo json_encode($departements); ?>;document.getElementById('dept').addEventListener('change',function(){let p=document.getElementById('poste');p.innerHTML='<option value="">Sélectionner un poste</option>';if(this.value&&depts[this.value]){for(let[k,v]of Object.entries(depts[this.value].postes)){let o=document.createElement('option');o.value=v;o.textContent=v;p.appendChild(o);}}});</script>
          </body></html>

    - name: Redémarrer Apache
      systemd:
        name: apache2
        state: restarted
        enabled: yes
