---
- name: Nettoyage complet avant installation
  block:

    - name: Supprimer le service systemd
      file:
        path: /etc/systemd/system/odoo.service
        state: absent
      ignore_errors: yes

    - name: Supprimer le répertoire Odoo
      file:
        path: /opt/odoo
        state: absent
      ignore_errors: yes

    - name: Supprimer le fichier de configuration
      file:
        path: /etc/odoo.conf
        state: absent
      ignore_errors: yes

    - name: Supprimer les logs
      file:
        path: /var/log/odoo
        state: absent
      ignore_errors: yes

    - name: Supprimer la base de données Leuz
      shell: |
        sudo -u postgres psql -c "DROP DATABASE IF EXISTS Leuz;" 2>/dev/null || true
        sudo -u postgres psql -c "DROP DATABASE IF EXISTS odoo;" 2>/dev/null || true
        sudo -u postgres psql -c "DROP USER IF EXISTS odoo;" 2>/dev/null || true
      ignore_errors: yes

- name: Mise à jour des paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer dépendances système
  apt:
    name:
      - python3.11
      - python3.11-dev
      - python3.11-venv
      - python3-pip
      - postgresql
      - postgresql-contrib
      - nodejs
      - npm
      - sassc
      - git
      - curl
      - wget
      - unzip
      - build-essential
      - libssl-dev
      - libffi-dev
      - libxml2-dev
      - libxslt1-dev
      - libjpeg-dev
      - libpq-dev
      - libldap2-dev
      - libsasl2-dev
      - python3-dev
    state: present

- name: Installer rtlcss
  npm:
    name: rtlcss
    global: yes
    state: present

- name: Créer utilisateur odoo
  user:
    name: odoo
    shell: /bin/bash
    home: /opt/odoo
    system: yes

- name: Créer répertoire Odoo
  file:
    path: /opt/odoo
    state: directory
    owner: odoo
    group: odoo
    mode: "0755"

- name: Augmenter buffer git
  command: git config --global http.postBuffer 524288000

- name: Forcer git en HTTP/1.1
  command: git config --global http.version HTTP/1.1

- name: Supprimer repo incomplet si présent
  file:
    path: /opt/odoo/odoo-17
    state: absent

- name: Cloner Odoo 17 (robuste avec retry)
  git:
    repo: https://github.com/odoo/odoo.git
    dest: /opt/odoo/odoo-17
    version: 17.0
    depth: 1
    single_branch: yes
  register: git_clone
  retries: 5
  delay: 20
  until: git_clone is succeeded

- name: Créer virtualenv
  command: python3.11 -m venv /opt/odoo/venv

- name: Fix permissions venv
  file:
    path: /opt/odoo/venv
    owner: odoo
    group: odoo
    recurse: yes

- name: Mettre à jour pip
  command: /opt/odoo/venv/bin/pip install --upgrade pip

- name: Installer wheel
  command: /opt/odoo/venv/bin/pip install wheel

- name: Installer dépendances minimales
  command: >
    /opt/odoo/venv/bin/pip install --default-timeout=300
    psycopg2-binary
    "lxml>=5.0"
    lxml_html_clean
    Pillow
    reportlab

- name: Installer python-ldap séparément
  command: /opt/odoo/venv/bin/pip install python-ldap
  register: ldap_install
  retries: 3
  delay: 20
  until: ldap_install.rc == 0

- name: Installer dépendances complémentaires
  command: >
    /opt/odoo/venv/bin/pip install --default-timeout=300
    babel chardet decorator docutils gevent greenlet Jinja2 MarkupSafe
    num2words passlib polib psutil pydot pyopenssl PyPDF2 pyserial
    python-dateutil python-stdnum pytz pyusb qrcode requests rjsmin
    urllib3 vobject Werkzeug xlrd XlsxWriter xlwt zeep
  ignore_errors: yes

- name: Fix permissions globales
  file:
    path: /opt/odoo
    owner: odoo
    group: odoo
    recurse: yes

- name: Créer utilisateur PostgreSQL
  shell: |
    sudo -u postgres psql -c "CREATE USER odoo WITH PASSWORD 'odoo' CREATEDB;" 2>/dev/null || true
    sudo -u postgres psql -c "ALTER USER odoo WITH PASSWORD 'odoo';" 2>/dev/null || true
  ignore_errors: yes

- name: Créer fichier config
  copy:
    dest: /etc/odoo.conf
    content: |
      [options]
      admin_passwd = admin
      db_host = 127.0.0.1
      db_port = 5432
      db_user = odoo
      db_password = odoo
      addons_path = /opt/odoo/odoo-17/addons
      logfile = /var/log/odoo/odoo.log
    owner: odoo
    group: odoo
    mode: "0644"

- name: Créer répertoire logs
  file:
    path: /var/log/odoo
    state: directory
    owner: odoo
    group: odoo

- name: Créer service systemd
  copy:
    dest: /etc/systemd/system/odoo.service
    content: |
      [Unit]
      Description=Odoo 17 ERP
      After=postgresql.service network.target

      [Service]
      Type=simple
      User=odoo
      ExecStart=/opt/odoo/venv/bin/python3 /opt/odoo/odoo-17/odoo-bin -c /etc/odoo.conf
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Démarrer PostgreSQL
  systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Reload systemd
  command: systemctl daemon-reload

# ================================
# INIT DB Leuz en français via odoo-bin
# ================================



- name: Démarrer Odoo
  systemd:
    name: odoo
    state: started
    enabled: yes

- name: Attendre Odoo (port 8069)
  wait_for:
    port: 8069
    timeout: 300

