---
- name: Mettre a jour les paquets
  apt:
    update_cache: yes
    upgrade: dist

- name: Installer nginx
  apt:
    name: nginx
    state: present

- name: Creer le repertoire du site
  file:
    path: /var/www/portail
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: Deployer le fichier HTML du portail
  copy:
    src: bienvenue.html
    dest: /var/www/portail/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: Redemarrer nginx

- name: Deployer l image de fond principale
  copy:
    src: background.jpg
    dest: /var/www/portail/background.jpg
    owner: www-data
    group: www-data
    mode: '0644'

- name: Deployer les images de fond
  copy:
    src: "{{ item }}"
    dest: "/var/www/portail/{{ item }}"
    owner: www-data
    group: www-data
    mode: '0644'
  loop:
    - background2.jpg
    - background3.png
    - background4.png

- name: Deployer la configuration nginx
  template:
    src: portail.conf.j2
    dest: /etc/nginx/sites-available/portail
    mode: '0644'
  notify: Redemarrer nginx

- name: Activer le site nginx
  file:
    src: /etc/nginx/sites-available/portail
    dest: /etc/nginx/sites-enabled/portail
    state: link
  notify: Redemarrer nginx

- name: Desactiver le site nginx par defaut
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Redemarrer nginx

- name: Demarrer et activer nginx
  service:
    name: nginx
    state: started
    enabled: yes
