---
- name: Mise à jour des paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances
  apt:
    name:
      - curl
      - wget
      - gnupg2
      - apt-transport-https
      - ca-certificates
      - debconf-utils
      - lua5.2
      - openssl
    state: present

- name: Ajouter le dépôt Prosody
  shell: |
    curl -fsSL https://packages.prosody.im/debian/pubkey.asc | gpg --dearmor -o /usr/share/keyrings/prosody-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/prosody-keyring.gpg] https://packages.prosody.im/debian $(lsb_release -cs) main" > /etc/apt/sources.list.d/prosody.list
  args:
    creates: /etc/apt/sources.list.d/prosody.list

- name: Installer Prosody >= 0.12
  apt:
    name: prosody
    state: present
    update_cache: yes

- name: Définir le hostname système
  hostname:
    name: jitsi.seimp.local

- name: Ajouter jitsi.seimp.local dans /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "192.168.10.35 jitsi.seimp.local jitsi"
    state: present

- name: Créer les répertoires Prosody
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: 0755
  loop:
    - /etc/prosody
    - /etc/prosody/conf.avail
    - /etc/prosody/conf.d
    - /etc/prosody/certs

- name: Créer localhost.cfg.lua
  copy:
    dest: /etc/prosody/conf.avail/localhost.cfg.lua
    force: no
    content: |
      VirtualHost "localhost"

- name: Créer lien localhost dans conf.d
  file:
    src: /etc/prosody/conf.avail/localhost.cfg.lua
    dest: /etc/prosody/conf.d/localhost.cfg.lua
    state: link
    force: yes

- name: Ajouter Include conf.d dans prosody.cfg.lua si absent
  lineinfile:
    path: /etc/prosody/prosody.cfg.lua
    line: 'Include "conf.d/*.cfg.lua"'
    state: present

- name: Démarrer Prosody
  systemd:
    name: prosody
    state: started
    enabled: yes

- name: Ajouter le dépôt Jitsi
  shell: |
    curl -fsSL https://download.jitsi.org/jitsi-key.gpg.key | gpg --dearmor -o /usr/share/keyrings/jitsi-keyring.gpg
    echo "deb [signed-by=/usr/share/keyrings/jitsi-keyring.gpg] https://download.jitsi.org stable/" > /etc/apt/sources.list.d/jitsi-stable.list
  args:
    creates: /etc/apt/sources.list.d/jitsi-stable.list

- name: Mise à jour après ajout du dépôt Jitsi
  apt:
    update_cache: yes

- name: Pré-configurer jitsi-videobridge hostname
  debconf:
    name: jitsi-videobridge2
    question: jitsi-videobridge/jvb-hostname
    value: "jitsi.seimp.local"
    vtype: string

- name: Pré-configurer jitsi-meet hostname
  debconf:
    name: jitsi-meet
    question: jitsi-meet/jvb-hostname
    value: "jitsi.seimp.local"
    vtype: string

- name: Pré-configurer jitsi-meet-prosody hostname
  debconf:
    name: jitsi-meet-prosody
    question: jitsi-meet-prosody/jvb-hostname
    value: "jitsi.seimp.local"
    vtype: string

- name: Pré-configurer le certificat SSL
  debconf:
    name: jitsi-meet
    question: jitsi-meet/cert-choice
    value: "Generate a new self-signed certificate"
    vtype: select

- name: Pré-configurer jvbsecret
  debconf:
    name: jitsi-videobridge2
    question: jitsi-videobridge/jvbsecret
    value: "jvbsecret123"
    vtype: string

- name: Pré-configurer jicofo auth password
  debconf:
    name: jicofo
    question: jicofo/jicofo-authpassword
    value: "jicofopass123"
    vtype: string

- name: Installer Jitsi Meet
  apt:
    name: jitsi-meet
    state: present
    update_cache: no
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Générer le certificat SSL auto-signé
  shell: |
    openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
      -keyout /etc/ssl/private/jitsi.seimp.local.key \
      -out /etc/ssl/certs/jitsi.seimp.local.crt \
      -subj "/CN=jitsi.seimp.local"
  args:
    creates: /etc/ssl/certs/jitsi.seimp.local.crt

- name: Créer le vhost nginx Jitsi
  copy:
    dest: /etc/nginx/sites-available/jitsi.seimp.local.conf
    content: |
      server {
          listen 80;
          server_name jitsi.seimp.local;
          return 301 https://$host$request_uri;
      }

      server {
          listen 443 ssl;
          server_name jitsi.seimp.local;

          ssl_certificate /etc/ssl/certs/jitsi.seimp.local.crt;
          ssl_certificate_key /etc/ssl/private/jitsi.seimp.local.key;

          root /usr/share/jitsi-meet;
          index index.html;

          location ~ ^/([a-zA-Z0-9=?]+)$ {
              rewrite ^/(.*)$ / break;
          }

          location / {
              ssi on;
          }

          location /http-bind {
              proxy_pass http://localhost:5280/http-bind;
              proxy_set_header X-Forwarded-For $remote_addr;
              proxy_set_header Host $http_host;
          }

          location /xmpp-websocket {
              proxy_pass http://localhost:5280/xmpp-websocket;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $http_host;
          }
      }

- name: Activer le vhost Jitsi
  file:
    src: /etc/nginx/sites-available/jitsi.seimp.local.conf
    dest: /etc/nginx/sites-enabled/jitsi.seimp.local.conf
    state: link
    force: yes

- name: Recharger nginx
  systemd:
    name: nginx
    state: reloaded
    enabled: yes

- name: Créer l'utilisateur admin Jitsi
  shell: |
    prosodyctl register admin jitsi.seimp.local admin123
  ignore_errors: yes

- name: Démarrer les services Jitsi
  systemd:
    name: "{{ item }}"
    state: restarted
    enabled: yes
  loop:
    - prosody
    - jicofo
    - jitsi-videobridge2

- name: Vérifier que Jitsi répond
  uri:
    url: https://192.168.10.35
    status_code: 200
    validate_certs: no
    timeout: 30
  register: result
  until: result.status == 200
  retries: 10
  delay: 5

- name: Afficher les informations
  debug:
    msg: |
      ✅ Jitsi Meet installé avec succès !

      🌐 URL         : https://192.168.10.35
      👤 Admin       : admin
      🔑 Mot de passe: admin123

      ⚠️  Ajoute dans ton fichier hosts Windows :
          192.168.10.35  jitsi.seimp.local

      Pour créer d'autres utilisateurs :
        vagrant ssh jitsi -c "sudo prosodyctl register <user> jitsi.seimp.local <password>"
