---
- name: Mise à jour des paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer slapd, ldap-utils et phpldapadmin
  apt:
    name:
      - slapd
      - ldap-utils
      - phpldapadmin
    state: present

- name: Configurer le domaine LDAP avec debconf-set-selections
  shell: |
    echo "slapd slapd/domain string nodomain" | debconf-set-selections
    echo "slapd slapd/organization string SEIMP" | debconf-set-selections
    echo "slapd slapd/internal/admin-password password admin123" | debconf-set-selections
    echo "slapd slapd/internal/admin-password_again password admin123" | debconf-set-selections
    echo "slapd slapd/backend select MDB" | debconf-set-selections
  changed_when: false

- name: Reconfigurer slapd
  shell: dpkg-reconfigure -f noninteractive slapd
  register: reconfigure_result

- name: S'assurer que slapd tourne
  systemd:
    name: slapd
    state: started
    enabled: yes

- name: Attendre que slapd soit prêt
  wait_for:
    port: 389
    timeout: 30

- name: Générer le hash du mot de passe admin123
  command: slappasswd -s admin123
  register: hashed_password
  changed_when: false

- name: Forcer le mot de passe admin dans LDAP
  shell: |
    ldapmodify -Y EXTERNAL -H ldapi:/// <<EOF
    dn: olcDatabase={1}mdb,cn=config
    replace: olcRootPW
    olcRootPW: {{ hashed_password.stdout }}
    EOF
  register: force_password
  changed_when: force_password.rc == 0

- name: Vérifier que l'authentification fonctionne
  command: ldapwhoami -x -D cn=admin,dc=nodomain -w admin123
  register: auth_test
  retries: 3
  delay: 5
  until: auth_test.rc == 0
  changed_when: false

- name: Créer le fichier LDIF des groupes
  template:
    src: ldap_groups.ldif.j2
    dest: /tmp/ldap_groups.ldif
    mode: 0644

- name: Ajouter les groupes LDAP
  command: ldapadd -x -D cn=admin,dc=nodomain -w admin123 -f /tmp/ldap_groups.ldif
  register: groups_result
  failed_when: groups_result.rc != 0 and "already exists" not in groups_result.stderr
  ignore_errors: yes

- name: Créer le fichier LDIF des utilisateurs
  template:
    src: ldap_users.ldif.j2
    dest: /tmp/ldap_users.ldif
    mode: 0644

- name: Ajouter les utilisateurs LDAP
  command: ldapadd -x -D cn=admin,dc=nodomain -w admin123 -f /tmp/ldap_users.ldif
  register: users_result
  failed_when: users_result.rc != 0 and "already exists" not in users_result.stderr
  ignore_errors: yes

- name: Configurer phpLDAPadmin
  template:
    src: config.php.j2
    dest: /etc/phpldapadmin/config.php
    mode: 0644
  notify: restart apache2

- name: Activer phpLDAPadmin
  command: a2enconf phpldapadmin
  ignore_errors: yes
  notify: restart apache2

- name: Redémarrer Apache
  systemd:
    name: apache2
    state: restarted
    enabled: yes
