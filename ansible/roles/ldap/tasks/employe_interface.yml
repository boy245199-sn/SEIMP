          $uidNumber = rand(20000, 30000);
          $gidNumber = $departements[$_POST['departement']]['gid'];
          $salt = substr(sha1(uniqid()), 0, 8);
          $password_hash = "{SSHA}" . base64_encode(sha1($_POST['password'] . $salt, true) . $salt);
          
          $dn = "uid=" . $uid . ",ou=people,dc=nodomain";
