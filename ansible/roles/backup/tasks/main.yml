---
- name: Mise à jour des paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances
  apt:
    name:
      - wget
      - bzip2
      - openssh-client
      - sshpass
      - mailutils
    state: present

- name: Télécharger Restic
  get_url:
    url: https://github.com/restic/restic/releases/download/v0.16.4/restic_0.16.4_linux_amd64.bz2
    dest: /tmp/restic.bz2
    timeout: 120

- name: Décompresser Restic
  command: bzip2 -d /tmp/restic.bz2
  args:
    creates: /tmp/restic
    removes: /tmp/restic.bz2

- name: Installer Restic
  copy:
    src: /tmp/restic
    dest: /usr/local/bin/restic
    mode: 0755
    remote_src: yes

- name: Créer le répertoire de backup
  file:
    path: /backup
    state: directory
    mode: 0750
    owner: root
    group: root

- name: Initialiser le dépôt Restic
  command: |
    /usr/local/bin/restic -r /backup/seimp init
  environment:
    RESTIC_PASSWORD: "SEIMP_Restic_Backup_2024!"
  ignore_errors: yes

- name: Créer le script de backup
  copy:
    dest: /usr/local/bin/backup.sh
    mode: 0700
    content: |
      #!/bin/bash
      export RESTIC_PASSWORD="SEIMP_Restic_Backup_2024!"
      export RESTIC_REPOSITORY="/backup/seimp"
      
      LOG_FILE="/var/log/backup.log"
      DATE=$(date '+%Y-%m-%d %H:%M:%S')
      
      echo "[$DATE] ========== DÉBUT SAUVEGARDE ==========" >> $LOG_FILE
      
      # Fonction de backup
      backup_service() {
          local name=$1
          local ip=$2
          local paths=$3
          
          echo "[$DATE] Backup $name ($ip)..." >> $LOG_FILE
          
          # Créer une archive tar
          ssh -o StrictHostKeyChecking=no vagrant@$ip "sudo tar czf /tmp/${name}_backup.tar.gz $paths 2>/dev/null"
          
          # Transférer l'archive
          scp vagrant@$ip:/tmp/${name}_backup.tar.gz /tmp/ 2>/dev/null
          
          # Sauvegarder avec Restic
          /usr/local/bin/restic backup /tmp/${name}_backup.tar.gz --tag $name >> $LOG_FILE 2>&1
          
          # Nettoyer
          ssh -o StrictHostKeyChecking=no vagrant@$ip "sudo rm -f /tmp/${name}_backup.tar.gz"
          rm -f /tmp/${name}_backup.tar.gz
          
          echo "[$DATE] Backup $name terminé" >> $LOG_FILE
      }
      
      # Sauvegardes
      backup_service "ldap" "192.168.10.10" "/etc/ldap /var/lib/ldap /var/www/html/employes.php /var/www/html/photos /var/www/html/data"
      backup_service "nextcloud" "192.168.10.11" "/var/www/html/nextcloud /var/lib/mysql"
      backup_service "odoo" "192.168.10.12" "/opt/odoo /etc/odoo.conf"
      backup_service "badge" "192.168.10.20" "/opt/badge /var/log/badge"
      
      # Vérification de l'intégrité
      echo "[$DATE] Vérification de l'intégrité..." >> $LOG_FILE
      /usr/local/bin/restic check >> $LOG_FILE 2>&1
      
      # Nettoyage des anciennes sauvegardes
      echo "[$DATE] Nettoyage..." >> $LOG_FILE
      /usr/local/bin/restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune >> $LOG_FILE 2>&1
      
      # Statistiques
      echo "[$DATE] Statistiques des snapshots :" >> $LOG_FILE
      /usr/local/bin/restic stats >> $LOG_FILE 2>&1
      
      echo "[$DATE] ========== FIN SAUVEGARDE ==========" >> $LOG_FILE
      echo "" >> $LOG_FILE

- name: Créer le script de restauration
  copy:
    dest: /usr/local/bin/restore.sh
    mode: 0700
    content: |
      #!/bin/bash
      export RESTIC_PASSWORD="SEIMP_Restic_Backup_2024!"
      export RESTIC_REPOSITORY="/backup/seimp"
      
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      NC='\033[0m'
      
      echo -e "${GREEN}========================================${NC}"
      echo -e "${GREEN}     RESTIC RESTORATION TOOL           ${NC}"
      echo -e "${GREEN}========================================${NC}"
      echo ""
      
      echo -e "${YELLOW}Snapshots disponibles :${NC}"
      /usr/local/bin/restic snapshots
      echo ""
      
      echo -e "${YELLOW}Entrez le snapshot ID à restaurer :${NC}"
      read SNAPSHOT_ID
      echo ""
      
      echo -e "${YELLOW}Service à restaurer (ldap/nextcloud/odoo/badge/all) :${NC}"
      read SERVICE
      
      RESTORE_DIR="/tmp/restore_$$"
      mkdir -p $RESTORE_DIR
      
      echo -e "${GREEN}Restoration en cours...${NC}"
      /usr/local/bin/restic restore $SNAPSHOT_ID --target $RESTORE_DIR
      
      case $SERVICE in
        ldap)
          echo -e "${GREEN}Restauration LDAP...${NC}"
          scp $RESTORE_DIR/*/ldap_backup.tar.gz vagrant@192.168.10.10:/tmp/
          ssh vagrant@192.168.10.10 "cd / && sudo tar xzf /tmp/ldap_backup.tar.gz"
          ssh vagrant@192.168.10.10 "sudo systemctl restart slapd"
          ;;
        nextcloud)
          echo -e "${GREEN}Restauration Nextcloud...${NC}"
          scp $RESTORE_DIR/*/nextcloud_backup.tar.gz vagrant@192.168.10.11:/tmp/
          ssh vagrant@192.168.10.11 "cd / && sudo tar xzf /tmp/nextcloud_backup.tar.gz"
          ssh vagrant@192.168.10.11 "sudo systemctl restart apache2 mariadb"
          ;;
        odoo)
          echo -e "${GREEN}Restauration Odoo...${NC}"
          scp $RESTORE_DIR/*/odoo_backup.tar.gz vagrant@192.168.10.12:/tmp/
          ssh vagrant@192.168.10.12 "cd / && sudo tar xzf /tmp/odoo_backup.tar.gz"
          ssh vagrant@192.168.10.12 "sudo systemctl restart odoo"
          ;;
        badge)
          echo -e "${GREEN}Restauration API Badges...${NC}"
          scp $RESTORE_DIR/*/badge_backup.tar.gz vagrant@192.168.10.20:/tmp/
          ssh vagrant@192.168.10.20 "cd / && sudo tar xzf /tmp/badge_backup.tar.gz"
          ssh vagrant@192.168.10.20 "sudo systemctl restart badge-api"
          ;;
        all)
          echo -e "${GREEN}Restauration complète...${NC}"
          scp $RESTORE_DIR/*/*.tar.gz vagrant@192.168.10.10:/tmp/
          ssh vagrant@192.168.10.10 "cd / && sudo tar xzf /tmp/ldap_backup.tar.gz && sudo systemctl restart slapd"
          scp $RESTORE_DIR/*/nextcloud_backup.tar.gz vagrant@192.168.10.11:/tmp/
          ssh vagrant@192.168.10.11 "cd / && sudo tar xzf /tmp/nextcloud_backup.tar.gz && sudo systemctl restart apache2 mariadb"
          scp $RESTORE_DIR/*/odoo_backup.tar.gz vagrant@192.168.10.12:/tmp/
          ssh vagrant@192.168.10.12 "cd / && sudo tar xzf /tmp/odoo_backup.tar.gz && sudo systemctl restart odoo"
          scp $RESTORE_DIR/*/badge_backup.tar.gz vagrant@192.168.10.20:/tmp/
          ssh vagrant@192.168.10.20 "cd / && sudo tar xzf /tmp/badge_backup.tar.gz && sudo systemctl restart badge-api"
          ;;
        *)
          echo -e "${RED}Service inconnu${NC}"
          ;;
      esac
      
      rm -rf $RESTORE_DIR
      echo -e "${GREEN}Restauration terminée !${NC}"

- name: Ajouter la crontab pour backup quotidien
  cron:
    name: "Backup quotidien Restic"
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/backup.sh"
    user: root

- name: Créer le répertoire de logs
  file:
    path: /var/log
    state: directory
    mode: 0755

- name: Tester Restic
  command: /usr/local/bin/restic -r /backup/seimp snapshots
  environment:
    RESTIC_PASSWORD: "SEIMP_Restic_Backup_2024!"
  register: restic_test
  changed_when: false

- name: Afficher résultat
  debug:
    msg: |
      ✅ Restic installé et configuré !
      📁 Dépôt: /backup/seimp
      🔐 Mot de passe: SEIMP_Restic_Backup_2024!
      
      Commandes utiles :
      - Voir les snapshots: restic -r /backup/seimp snapshots
      - Restaurer: /usr/local/bin/restore.sh
      - Backup manuel: /usr/local/bin/backup.sh
