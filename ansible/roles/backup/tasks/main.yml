---
- name: Mise à jour des paquets
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Installer les dépendances
  apt:
    name:
      - wget
      - bzip2
      - openssh-client
      - sshpass
      - mailutils
      - nfs-kernel-server
      - samba
      - cifs-utils
    state: present

- name: Télécharger Restic
  get_url:
    url: https://github.com/restic/restic/releases/download/v0.16.4/restic_0.16.4_linux_amd64.bz2
    dest: /tmp/restic.bz2
    timeout: 120

- name: Décompresser Restic
  command: bzip2 -d /tmp/restic.bz2
  args:
    creates: /tmp/restic
    removes: /tmp/restic.bz2

- name: Installer Restic
  copy:
    src: /tmp/restic
    dest: /usr/local/bin/restic
    mode: 0755
    remote_src: yes

- name: Créer les répertoires
  file:
    path: "{{ item }}"
    state: directory
    mode: 0755
    owner: root
    group: root
  loop:
    - /backup
    - /srv/nfs/documents
    - /srv/nfs/factures
    - /srv/nfs/employes
    - /srv/nfs/logs
    - /srv/nfs/odoo
    - /srv/nfs/nextcloud

- name: Initialiser le dépôt Restic
  command: |
    /usr/local/bin/restic -r /backup/seimp init
  environment:
    RESTIC_PASSWORD: "SEIMP_Restic_Backup_2024!"
  ignore_errors: yes

- name: Configurer NFS (exports)
  copy:
    dest: /etc/exports
    content: |
      /srv/nfs/documents 192.168.20.0/24(rw,sync,no_subtree_check)
      /srv/nfs/factures 192.168.20.0/24(rw,sync,no_subtree_check)
      /srv/nfs/employes 192.168.20.0/24(rw,sync,no_subtree_check)
      /srv/nfs/odoo     192.168.20.0/24(rw,sync,no_subtree_check)
      /srv/nfs/nextcloud 192.168.20.0/24(rw,sync,no_subtree_check)

- name: Redémarrer NFS
  systemd:
    name: nfs-server
    state: restarted
    enabled: yes

- name: Configurer Samba
  copy:
    dest: /etc/samba/smb.conf
    content: |
      [global]
         workgroup = SEIMP
         server string = SEIMP Backup NAS
         security = user
         map to guest = Bad User
      
      [documents]
         path = /srv/nfs/documents
         browseable = yes
         read only = no
         guest ok = yes
         create mask = 0777
         directory mask = 0777
      
      [factures]
         path = /srv/nfs/factures
         browseable = yes
         read only = no
         guest ok = yes
      
      [employes]
         path = /srv/nfs/employes
         browseable = yes
         read only = no
         guest ok = yes
      
      [odoo]
         path = /srv/nfs/odoo
         browseable = yes
         read only = no
         guest ok = yes
      
      [nextcloud]
         path = /srv/nfs/nextcloud
         browseable = yes
         read only = no
         guest ok = yes

- name: Démarrer Samba
  systemd:
    name: smbd
    state: restarted
    enabled: yes

- name: Créer le script de backup complet
  copy:
    dest: /usr/local/bin/backup.sh
    mode: 0700
    content: |
      #!/bin/bash
      export RESTIC_PASSWORD="SEIMP_Restic_Backup_2024!"
      export RESTIC_REPOSITORY="/backup/seimp"
      
      LOG_FILE="/var/log/backup.log"
      DATE=$(date '+%Y-%m-%d %H:%M:%S')
      
      echo "[$DATE] ========== DÉBUT SAUVEGARDE ==========" >> $LOG_FILE
      
      # Fonction de backup
      backup_service() {
          local name=$1
          local ip=$2
          local paths=$3
          
          echo "[$DATE] Backup $name ($ip)..." >> $LOG_FILE
          
          ssh -o StrictHostKeyChecking=no vagrant@$ip "sudo tar czf /tmp/${name}_backup.tar.gz $paths 2>/dev/null"
          scp vagrant@$ip:/tmp/${name}_backup.tar.gz /tmp/ 2>/dev/null
          /usr/local/bin/restic backup /tmp/${name}_backup.tar.gz --tag $name >> $LOG_FILE 2>&1
          ssh -o StrictHostKeyChecking=no vagrant@$ip "sudo rm -f /tmp/${name}_backup.tar.gz"
          rm -f /tmp/${name}_backup.tar.gz
          echo "[$DATE] Backup $name terminé" >> $LOG_FILE
      }
      
      # Sauvegarde de TOUTES les VMs
      backup_service "ldap" "192.168.20.10" "/etc/ldap /var/lib/ldap /var/www/html"
      backup_service "portail" "192.168.20.40" "/var/www/html"
      backup_service "nextcloud" "192.168.20.11" "/var/www/html/nextcloud /var/lib/mysql"
      backup_service "odoo" "192.168.20.12" "/opt/odoo /etc/odoo.conf /var/lib/postgresql"
      backup_service "badge" "192.168.20.20" "/opt/badge /var/log/badge"
      backup_service "mail" "192.168.20.30" "/opt/mailcow /var/vmail"
      backup_service "wiki" "192.168.20.32" "/var/www/bookstack"
      backup_service "vaultwarden" "192.168.20.34" "/opt/vaultwarden/data"
      backup_service "metabase" "192.168.20.36" "/opt/metabase/data"
      backup_service "n8n" "192.168.20.37" "/opt/n8n/data"
      backup_service "plane" "192.168.20.38" "/opt/plane/data"
      
      # Sauvegarde des répertoires NAS
      echo "[$DATE] Sauvegarde des données NAS..." >> $LOG_FILE
      tar czf /tmp/nas_backup.tar.gz /srv/nfs 2>/dev/null
      /usr/local/bin/restic backup /tmp/nas_backup.tar.gz --tag nas >> $LOG_FILE 2>&1
      rm -f /tmp/nas_backup.tar.gz
      
      # Vérification
      echo "[$DATE] Vérification de l'intégrité..." >> $LOG_FILE
      /usr/local/bin/restic check >> $LOG_FILE 2>&1
      
      # Nettoyage
      echo "[$DATE] Nettoyage..." >> $LOG_FILE
      /usr/local/bin/restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune >> $LOG_FILE 2>&1
      
      echo "[$DATE] ========== FIN SAUVEGARDE ==========" >> $LOG_FILE

- name: Créer le script de restauration
  copy:
    dest: /usr/local/bin/restore.sh
    mode: 0700
    content: |
      #!/bin/bash
      export RESTIC_PASSWORD="SEIMP_Restic_Backup_2024!"
      export RESTIC_REPOSITORY="/backup/seimp"
      
      RED='\033[0;31m'
      GREEN='\033[0;32m'
      YELLOW='\033[1;33m'
      NC='\033[0m'
      
      echo -e "${GREEN}========================================${NC}"
      echo -e "${GREEN}     RESTIC RESTORATION TOOL           ${NC}"
      echo -e "${GREEN}========================================${NC}"
      echo ""
      
      echo -e "${YELLOW}Snapshots disponibles :${NC}"
      /usr/local/bin/restic snapshots
      echo ""
      
      echo -e "${YELLOW}Entrez le snapshot ID à restaurer :${NC}"
      read SNAPSHOT_ID
      echo ""
      
      echo -e "${YELLOW}Service à restaurer (ldap/nextcloud/odoo/badge/mail/wiki/vaultwarden/nas/all) :${NC}"
      read SERVICE
      
      RESTORE_DIR="/tmp/restore_$$"
      mkdir -p $RESTORE_DIR
      
      echo -e "${GREEN}Restoration en cours...${NC}"
      /usr/local/bin/restic restore $SNAPSHOT_ID --target $RESTORE_DIR
      
      case $SERVICE in
        ldap)
          scp $RESTORE_DIR/*/ldap_backup.tar.gz vagrant@192.168.20.10:/tmp/
          ssh vagrant@192.168.20.10 "cd / && sudo tar xzf /tmp/ldap_backup.tar.gz && sudo systemctl restart slapd"
          ;;
        nextcloud)
          scp $RESTORE_DIR/*/nextcloud_backup.tar.gz vagrant@192.168.20.11:/tmp/
          ssh vagrant@192.168.20.11 "cd / && sudo tar xzf /tmp/nextcloud_backup.tar.gz && sudo systemctl restart apache2 mariadb"
          ;;
        odoo)
          scp $RESTORE_DIR/*/odoo_backup.tar.gz vagrant@192.168.20.12:/tmp/
          ssh vagrant@192.168.20.12 "cd / && sudo tar xzf /tmp/odoo_backup.tar.gz && sudo systemctl restart odoo"
          ;;
        badge)
          scp $RESTORE_DIR/*/badge_backup.tar.gz vagrant@192.168.20.20:/tmp/
          ssh vagrant@192.168.20.20 "cd / && sudo tar xzf /tmp/badge_backup.tar.gz && sudo systemctl restart badge-api"
          ;;
        mail)
          scp $RESTORE_DIR/*/mail_backup.tar.gz vagrant@192.168.20.30:/tmp/
          ssh vagrant@192.168.20.30 "cd / && sudo tar xzf /tmp/mail_backup.tar.gz && sudo systemctl restart docker"
          ;;
        wiki)
          scp $RESTORE_DIR/*/wiki_backup.tar.gz vagrant@192.168.20.32:/tmp/
          ssh vagrant@192.168.20.32 "cd / && sudo tar xzf /tmp/wiki_backup.tar.gz && sudo systemctl restart apache2"
          ;;
        vaultwarden)
          scp $RESTORE_DIR/*/vaultwarden_backup.tar.gz vagrant@192.168.20.34:/tmp/
          ssh vagrant@192.168.20.34 "cd / && sudo tar xzf /tmp/vaultwarden_backup.tar.gz && sudo systemctl restart docker"
          ;;
        nas)
          tar xzf $RESTORE_DIR/*/nas_backup.tar.gz -C /
          systemctl restart nfs-server smbd
          ;;
        all)
          scp $RESTORE_DIR/*/*.tar.gz vagrant@192.168.20.10:/tmp/
          ssh vagrant@192.168.20.10 "cd / && sudo tar xzf /tmp/ldap_backup.tar.gz && sudo systemctl restart slapd"
          scp $RESTORE_DIR/*/nextcloud_backup.tar.gz vagrant@192.168.20.11:/tmp/
          ssh vagrant@192.168.20.11 "cd / && sudo tar xzf /tmp/nextcloud_backup.tar.gz && sudo systemctl restart apache2 mariadb"
          scp $RESTORE_DIR/*/odoo_backup.tar.gz vagrant@192.168.20.12:/tmp/
          ssh vagrant@192.168.20.12 "cd / && sudo tar xzf /tmp/odoo_backup.tar.gz && sudo systemctl restart odoo"
          scp $RESTORE_DIR/*/badge_backup.tar.gz vagrant@192.168.20.20:/tmp/
          ssh vagrant@192.168.20.20 "cd / && sudo tar xzf /tmp/badge_backup.tar.gz && sudo systemctl restart badge-api"
          tar xzf $RESTORE_DIR/*/nas_backup.tar.gz -C /
          systemctl restart nfs-server smbd
          ;;
      esac
      
      rm -rf $RESTORE_DIR
      echo -e "${GREEN}Restauration terminée !${NC}"

- name: Ajouter la crontab pour backup quotidien
  cron:
    name: "Backup quotidien Restic"
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/backup.sh"
    user: root

- name: Ouvrir les ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - 2049
    - 445
    - 139
    - 111
  ignore_errors: yes

- name: Tester Restic
  command: /usr/local/bin/restic -r /backup/seimp snapshots
  environment:
    RESTIC_PASSWORD: "SEIMP_Restic_Backup_2024!"
  register: restic_test
  changed_when: false

- name: Afficher résultat
  debug:
    msg: |
      ✅ Restic installé et configuré !
      📁 Dépôt: /backup/seimp
      🔐 Mot de passe: SEIMP_Restic_Backup_2024!
      
      📡 Services sauvegardés :
      - LDAP, Portail, Nextcloud, Odoo, Badge
      - Mail, Wiki, Vaultwarden, Metabase, n8n, Plane
      - Données NAS (documents, factures, employés)
      
      💾 Points de montage NAS :
      - NFS : mount -t nfs 192.168.20.21:/srv/nfs /mnt/nas
      - Samba : \\192.168.20.21\documents
      
      📝 Commandes utiles :
      - Backup manuel: /usr/local/bin/backup.sh
      - Restauration: /usr/local/bin/restore.sh
      - Voir snapshots: restic -r /backup/seimp snapshots
